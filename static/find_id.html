<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>아이디 찾기 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.3">

    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div class="page-content-wrapper">
        <div class="auth-wrapper">
            <h1 style="font-size: 2rem; margin-bottom: 12px; color: var(--color-primary);">👨‍👩‍👧‍👦 우리 가족</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: 32px;">가입하신 닉네임을 입력해 주세요.</p>

            <div class="auth-card">
                <form onsubmit="event.preventDefault(); handleFindId();">
                    <div class="text-left mb-32">
                        <label class="form-label-auth">가입 닉네임</label>
                        <input type="text" id="nickname" class="toss-input" placeholder="예: 엄마, 길동이" required>
                    </div>
                    <button type="submit" id="submit-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">아이디 찾기</button>
                </form>

                <div id="result" class="accent-card text-center mt-32" style="display: none; color: var(--color-primary); font-weight: 700;"></div>

                <div class="auth-footer-links">
                    <a href="/login.html" class="subtle-link">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleFindId() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) return;

            const btn = document.getElementById('submit-btn');
            const resultEl = document.getElementById('result');
            btn.disabled = true;
            resultEl.style.display = 'none';

            try {
                const data = await api.post('/find_id', { nickname });
                resultEl.textContent = `찾으시는 아이디는 [ ${data.username} ] 입니다.`;
                resultEl.style.display = 'block';
            } catch (error) {
                alert(`아이디 찾기 실패: ${error.message}`);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
