<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>👨‍👩‍👧‍👦 우리 가족 - 메인</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3182f6">
    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <!-- Hero Section -->
            <section class="hero-banner">
                <h1>우리 가족만의 소중한 공간 🏡</h1>
                <p>가족과 함께 일상을 공유하고, 추억을 사진으로 남겨보세요.</p>
            </section>

            <!-- Feature Quick Links -->
            <section class="feature-grid mb-48">
                <a href="/board.html" class="feature-card">
                    <span class="feature-icon">📝</span>
                    <h3>가족 게시판</h3>
                    <p>서로의 소식을 전하고 투표, 토론을 해보세요.</p>
                </a>
                <a href="/album.html" class="feature-card">
                    <span class="feature-icon">📸</span>
                    <h3>가족 앨범</h3>
                    <p>가족과 함께 찍은 사진을 올리고 공유해요.</p>
                </a>
                <a href="/calendar.html" class="feature-card">
                    <span class="feature-icon">📅</span>
                    <h3>가족 캘린더</h3>
                    <p>가족 행사, 기념일, 일정을 관리하세요.</p>
                </a>
            </section>

            <!-- Dynamic Content Previews -->
            <div class="home-dynamic-row mb-48">
                <!-- Recent Posts -->
                <section class="content-section">
                    <div class="section-header">
                        <h2>최근 소식 📝</h2>
                        <a href="/board.html" class="subtle-link">더보기 ></a>
                    </div>
                    <div id="recent-posts-list" class="post-list">
                        <p style="color: var(--color-text-tertiary); text-align: center; padding: 20px;">불러오는 중...</p>
                    </div>
                </section>

                <!-- Recent Photos -->
                <section class="content-section">
                    <div class="section-header">
                        <h2>최근 앨범 📸</h2>
                        <a href="/album.html" class="subtle-link">더보기 ></a>
                    </div>
                    <div id="recent-photos-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                        <p style="grid-column: span 2; color: var(--color-text-tertiary); text-align: center; padding: 20px;">불러오는 중...</p>
                    </div>
                </section>
            </div>

            <!-- Upcoming Anniversaries Section -->
            <section class="content-section section-upcoming mb-48">
                <div class="section-header">
                    <h2>다가오는 기념일 & 일정 📅</h2>
                    <a href="/calendar.html" class="subtle-link">캘린더 보기 ></a>
                </div>
                <div id="upcoming-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                    <p style="color: var(--color-text-tertiary); text-align: center; padding: 20px;">불러오는 중...</p>
                </div>
            </section>

            <!-- Active Votes Preview -->
            <section class="content-section" id="votes-section" style="display: none;">
                <div class="section-header">
                    <h2>진행 중인 투표 🗳️</h2>
                    <a href="/vote.html" class="subtle-link">전체보기 ></a>
                </div>
                <div id="votes-preview"></div>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>

    <script>
        async function loadHomePreviews() {
            try {
                // Load recent posts
                const postsData = await api.get('/posts?page=1');
                const postsList = document.getElementById('recent-posts-list');
                postsList.innerHTML = '';
                postsData.posts.slice(0, 3).forEach(post => {
                    const postItem = document.createElement('a');
                    postItem.href = `/post.html?id=${post.id}`;
                    postItem.className = 'post-item';
                    postItem.style.padding = '12px 16px';

                    const titleDiv = document.createElement('div');
                    titleDiv.style.cssText = 'font-weight: 600; font-size: 0.95rem; color: var(--color-text-primary);';
                    titleDiv.textContent = post.title;
                    
                    const metaDiv = document.createElement('div');
                    metaDiv.style.cssText = 'font-size: 0.8rem; color: var(--color-text-tertiary); margin-top: 4px;';
                    metaDiv.textContent = `${post.author_nickname} · 댓글 ${post.comments ? post.comments.length : 0} · ❤️ ${post.like_count || 0}`;
                    
                    postItem.appendChild(titleDiv);
                    postItem.appendChild(metaDiv);
                    postsList.appendChild(postItem);
                });
                if (postsData.posts.length === 0) postsList.innerHTML = '<p style="text-align:center; color:var(--color-text-tertiary);">게시글이 없습니다.</p>';

                // Load recent photos
                const photosData = await api.get('/photos');
                const photosGrid = document.getElementById('recent-photos-grid');
                photosGrid.innerHTML = '';
                const photos = photosData.photos || photosData;
                (Array.isArray(photos) ? photos : []).slice(0, 4).forEach(photo => {
                    const img = document.createElement('div');
                    img.style.cssText = `
                        background-image: url('${escapeHtml(photo.url)}');
                        background-size: cover;
                        background-position: center;
                        height: 120px;
                        border-radius: 12px;
                        box-shadow: var(--shadow-sm);
                    `;
                    photosGrid.appendChild(img);
                });
                const photoList = Array.isArray(photos) ? photos : [];
                if (photoList.length === 0) photosGrid.innerHTML = '<p style="grid-column: span 2; text-align:center; color:var(--color-text-tertiary);">사진이 없습니다.</p>';

                // Load upcoming anniversaries
                const upcomingData = await api.get('/upcoming');
                const upcomingList = document.getElementById('upcoming-list');
                upcomingList.innerHTML = '';
                
                upcomingData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'upcoming-card';
                    
                    const dateObj = new Date(item.date);
                    const formattedDate = `${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일`;
                    const dayName = ['일', '월', '화', '수', '목', '금', '토'][dateObj.getDay()];
                    
                    const sId = item.id.toString();
                    const typeIcon = sId.startsWith('h_') ? '🇰🇷' : (sId.startsWith('a_') ? '🎂' : '📌');
                    const typeLabel = sId.startsWith('h_') ? '공휴일' : (sId.startsWith('a_') ? '기념일' : '일정');
                    const labelClass = sId.startsWith('h_') ? 'label-holiday' : (sId.startsWith('a_') ? 'label-anniv' : 'label-event');

                    const labelSpan = document.createElement('span');
                    labelSpan.className = `type-label ${labelClass}`;
                    labelSpan.textContent = typeLabel;

                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'upcoming-date';
                    dateSpan.textContent = `${formattedDate} (${dayName})`;

                    const topRow = document.createElement('div');
                    topRow.className = 'flex-between';
                    topRow.appendChild(labelSpan);
                    topRow.appendChild(dateSpan);

                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'upcoming-title';
                    titleDiv.textContent = `${typeIcon} ${item.title}`;

                    card.appendChild(topRow);
                    card.appendChild(titleDiv);
                    card.onclick = () => { window.location.href = `/calendar.html?date=${item.date}`; };
                    upcomingList.appendChild(card);
                });
                if (upcomingData.length === 0) upcomingList.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:var(--color-text-tertiary);">다가오는 일정이 없습니다.</p>';

                // Load active votes
                try {
                    const votes = await api.get('/votes');
                    const activeVotes = votes.filter(v => v.is_active);
                    if (activeVotes.length > 0) {
                        document.getElementById('votes-section').style.display = 'block';
                        const preview = document.getElementById('votes-preview');
                        preview.innerHTML = '';
                        activeVotes.slice(0, 2).forEach(vote => {
                            const card = document.createElement('a');
                            card.href = '/vote.html';
                            card.className = 'post-item';
                            card.style.padding = '16px';
                            
                            const titleEl = document.createElement('div');
                            titleEl.style.cssText = 'font-weight: 600; font-size: 0.95rem; color: var(--color-text-primary);';
                            titleEl.textContent = `🗳️ ${vote.title}`;
                            
                            const metaEl = document.createElement('div');
                            metaEl.style.cssText = 'font-size: 0.8rem; color: var(--color-text-tertiary); margin-top: 4px;';
                            metaEl.textContent = `${vote.author_nickname} · ${vote.total_responses}명 참여`;
                            
                            card.appendChild(titleEl);
                            card.appendChild(metaEl);
                            preview.appendChild(card);
                        });
                    }
                } catch (e) {}

            } catch (error) {
                console.error('Home preview load failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadHomePreviews);
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js?v=3.0"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.log('SW reg failed:', err);
                });
            });
        }
    </script>
</body>
</html>
