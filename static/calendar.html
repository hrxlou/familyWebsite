<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 캘린더 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header class="toss-header">
        <h1><a href="/" style="text-decoration:none; color:inherit;">🏡 우리 가족</a></h1>
        <nav class="toss-nav">
            <ul>
                <li><a href="/">홈</a></li>
                <li><a href="/album.html">앨범</a></li>
                <li><a href="/board.html">게시판</a></li>
                <li class="active"><a href="/calendar.html">캘린더</a></li>
            </ul>
        </nav>
        <div id="nav-user-section"></div>
    </header>
    <div class="page-content-wrapper">
        <main class="toss-main">
            <section class="content-section calendar-container">
                <div id="calendar-view">
                    <div class="calendar-header">
                        <button id="prev-btn">&lt;</button>
                        <div class="date-picker-container">
                            <h2 id="current-year-display"></h2>
                            <h2 id="current-month-display"></h2>
                        </div>
                        <button id="next-btn">&gt;</button>
                    </div>
                    <div id="calendar-grid-container"></div>
                </div>
                <div id="month-picker-view" style="display: none;">
                    <div class="calendar-header"><h2 id="current-year-picker"></h2></div>
                    <div class="month-picker"></div>
                </div>
                <div id="year-picker-view" style="display: none;">
                    <div class="calendar-header">
                        <button id="prev-year-range">&lt;</button>
                        <h2 id="year-range-display"></h2>
                        <button id="next-year-range">&gt;</button>
                    </div>
                    <div class="year-picker"></div>
                </div>
                <div id="daily-view" style="display: none;">
                    <h3 id="daily-view-date"></h3>
                    <div id="add-event-area">
                        <h4>새로운 일정 추가</h4>
                        <form id="add-event-form">
                            <div class="event-type-options">
                                <label><input type="radio" name="event_type" value="event" checked> 일반 일정</label>
                                <label><input type="radio" name="event_type" value="anniversary"> 고정 기념일</label>
                            </div>
                            <div class="input-group">
                                <input type="text" id="new-event-title" class="toss-input" placeholder="일정 내용을 입력하세요" required>
                                <button type="submit" class="toss-button primary">추가</button>
                            </div>
                        </form>
                    </div>
                    <ul id="daily-event-list"></ul>
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <button id="back-to-calendar-btn" class="toss-button">달력으로 돌아가기</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="shared.js"></script>
    <script src="chatbot.js"></script>
    <script>
        const calendarView = document.getElementById('calendar-view');
        const monthPickerView = document.getElementById('month-picker-view');
        const yearPickerView = document.getElementById('year-picker-view');
        const dailyView = document.getElementById('daily-view');
        const currentYearDisplayEl = document.getElementById('current-year-display');
        const currentMonthDisplayEl = document.getElementById('current-month-display');
        const calendarGridContainer = document.getElementById('calendar-grid-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const dailyViewDateEl = document.getElementById('daily-view-date');
        const addEventForm = document.getElementById('add-event-form');
        const newEventTitleInput = document.getElementById('new-event-title');
        const dailyEventList = document.getElementById('daily-event-list');
        const backToCalendarBtn = document.getElementById('back-to-calendar-btn');
        const currentYearPickerEl = document.getElementById('current-year-picker');
        const monthPickerGrid = document.querySelector('.month-picker');
        const yearPickerGrid = document.querySelector('.year-picker');
        const prevYearRangeBtn = document.getElementById('prev-year-range');
        const nextYearRangeBtn = document.getElementById('next-year-range');
        const yearRangeDisplay = document.getElementById('year-range-display');

        let currentDate = new Date();
        let currentView = 'calendar';
        let currentYearRangeStart;
        let eventsCache = {};

        function showView(viewName) {
            calendarView.style.display = 'none';
            monthPickerView.style.display = 'none';
            yearPickerView.style.display = 'none';
            dailyView.style.display = 'none';
            document.getElementById(`${viewName}-view`).style.display = 'block';
            currentView = viewName;
        }
        
        function showDailyView(dateStr) {
            showView('daily');
            renderDailyEvents(dateStr);
        }

        async function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date();
            currentYearDisplayEl.textContent = `${year}년`;
            currentMonthDisplayEl.textContent = `${month + 1}월`;
            const monthlyEvents = await fetchEvents(year, month + 1);
            calendarGridContainer.innerHTML = `<div class="calendar-grid"><div class="day-name">일</div><div class="day-name">월</div><div class="day-name">화</div><div class="day-name">수</div><div class="day-name">목</div><div class="day-name">금</div><div class="day-name">토</div></div>`;
            const calendarGrid = calendarGridContainer.querySelector('.calendar-grid');
            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const lastDateOfMonth = new Date(year, month + 1, 0).getDate();
            const lastDateOfPrevMonth = new Date(year, month, 0).getDate();
            for (let i = firstDayOfMonth; i > 0; i--) calendarGrid.insertAdjacentHTML('beforeend', `<div class="calendar-day other-month">${lastDateOfPrevMonth - i + 1}</div>`);
            
            for (let day = 1; day <= lastDateOfMonth; day++) {
                const dayDiv = document.createElement('div');
                const dayDate = new Date(year, month, day);
                const dayOfWeek = dayDate.getDay();
                dayDiv.className = 'calendar-day';
                if (dayOfWeek === 0) dayDiv.classList.add('sunday');
                if (dayOfWeek === 6) dayDiv.classList.add('saturday');
                dayDiv.innerHTML = `<span class="day-number">${day}</span>`;
                dayDiv.style.cursor = 'pointer';
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                dayDiv.dataset.date = dateStr;
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) dayDiv.classList.add('today');
                
                const eventsOnThisDay = monthlyEvents.filter(e => e.date === dateStr);
                
                if (eventsOnThisDay.length > 0) {
                    eventsOnThisDay.forEach(event => {
                        const eventDiv = document.createElement('div');
                        eventDiv.className = `event event-type-${event.type}`;
                        
                        if (currentUser) {
                            eventDiv.textContent = event.title;
                        } else {
                            eventDiv.textContent = '◉'; 
                        }
                        
                        dayDiv.appendChild(eventDiv);
                    });
                }

                dayDiv.addEventListener('click', () => {
                    if (currentUser) {
                        showDailyView(dateStr);
                    } else {
                        alert('일정의 상세 내용을 보거나 관리하려면 로그인이 필요합니다.');
                        window.location.href = `/login.html?redirect=/calendar.html`;
                    }
                });
                calendarGrid.appendChild(dayDiv);
            }
            const totalDays = firstDayOfMonth + lastDateOfMonth;
            for (let i = 1; i <= 42 - totalDays; i++) calendarGrid.insertAdjacentHTML('beforeend', `<div class="calendar-day other-month">${i}</div>`);
        }

        function renderMonthPicker() {
            currentYearPickerEl.textContent = `${currentDate.getFullYear()}년`;
            monthPickerGrid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const monthItem = document.createElement('div');
                monthItem.className = 'picker-item';
                if (i === currentDate.getMonth()) {
                    monthItem.classList.add('active');
                }
                monthItem.textContent = `${i + 1}월`;
                monthItem.onclick = () => {
                    currentDate.setMonth(i);
                    showView('calendar');
                    renderCalendar();
                };
                monthPickerGrid.appendChild(monthItem);
            }
        }

        function renderYearPicker(startYear) {
            currentYearRangeStart = startYear;
            yearRangeDisplay.textContent = `${startYear} - ${startYear + 11}`;
            yearPickerGrid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const year = startYear + i;
                const yearItem = document.createElement('div');
                yearItem.className = 'picker-item';
                if (year === currentDate.getFullYear()) {
                    yearItem.classList.add('active');
                }
                yearItem.textContent = year;
                yearItem.onclick = () => {
                    currentDate.setFullYear(year);
                    showView('month-picker');
                    renderMonthPicker();
                };
                yearPickerGrid.appendChild(yearItem);
            }
        }

        async function renderDailyEvents(dateStr) {
            dailyViewDateEl.textContent = `${dateStr.split('-')[0]}년 ${parseInt(dateStr.split('-')[1], 10)}월 ${parseInt(dateStr.split('-')[2], 10)}일`;
            dailyView.dataset.currentDate = dateStr;
            dailyEventList.innerHTML = '<li>일정을 불러오는 중...</li>';
            const allEvents = await fetchEvents(currentDate.getFullYear(), currentDate.getMonth() + 1);
            const todaysEvents = allEvents.filter(e => e.date === dateStr);
            dailyEventList.innerHTML = '';
            if (todaysEvents.length === 0) {
                dailyEventList.innerHTML = '<li style="text-align: center; color: #4e5968;">이 날에는 등록된 일정이 없습니다.</li>';
            } else {
                todaysEvents.forEach(event => {
                    const li = document.createElement('li');
                    li.className = `daily-event-item event-type-${event.type}`;
                    li.dataset.eventId = event.id;
                    const actionsHTML = (currentUser && event.type !== 'holiday') ? `<div class="actions"><button class="edit-btn">변경</button><button class="delete-btn">삭제</button></div>` : '';
                    li.innerHTML = `<span class="event-title">${event.title}</span>${actionsHTML}`;
                    dailyEventList.appendChild(li);
                });
            }
        }

        async function fetchEvents(year, month) {
            const cacheKey = `${year}-${month}`;
            if (eventsCache[cacheKey]) return eventsCache[cacheKey];
            try {
                const response = await fetch(`/api/events?year=${year}&month=${month}`);
                const data = await response.json();
                eventsCache[cacheKey] = data;
                return data;
            } catch (error) { return []; }
        }

        // ★★★★★ 수정된 함수 ★★★★★
        async function handleApiAction(url, options) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '요청 실패');
                }
                
                // 1. 캐시를 비워서 새로운 데이터를 불러오게 합니다.
                eventsCache = {}; 
                
                // 2. 메인 달력을 다시 렌더링해서 보이지 않는 부분의 데이터를 업데이트합니다.
                await renderCalendar();
                
                // 3. 현재 '일별 보기' 화면이라면, 해당 화면도 즉시 다시 렌더링합니다.
                if (currentView === 'daily') {
                    await renderDailyEvents(dailyView.dataset.currentDate);
                }
            } catch (error) {
                alert(error.message);
            }
        }

        currentYearDisplayEl.addEventListener('click', () => { 
            showView('year-picker'); 
            renderYearPicker(currentDate.getFullYear() - 4); 
        });
        currentMonthDisplayEl.addEventListener('click', () => { 
            showView('month-picker'); 
            renderMonthPicker(); 
        });
        currentYearPickerEl.addEventListener('click', () => { 
            showView('year-picker'); 
            renderYearPicker(currentDate.getFullYear() - 4); 
        });
        prevBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
        nextBtn.addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
        prevYearRangeBtn.addEventListener('click', () => renderYearPicker(currentYearRangeStart - 12));
        nextYearRangeBtn.addEventListener('click', () => renderYearPicker(currentYearRangeStart + 12));
        backToCalendarBtn.addEventListener('click', () => showView('calendar'));

        addEventForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = newEventTitleInput.value.trim();
            const eventType = document.querySelector('input[name="event_type"]:checked').value;
            const dateStr = dailyView.dataset.currentDate;
            if (title) {
                if (eventType === 'anniversary') {
                    const [, month, day] = dateStr.split('-').map(Number);
                    await handleApiAction('/api/anniversaries', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify({ month, day, title }) });
                } else {
                    await handleApiAction('/api/events', { method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify({ date: dateStr, title }) });
                }
                newEventTitleInput.value = '';
            }
        });

        dailyEventList.addEventListener('click', (e) => {
            if (!currentUser) return;
            const target = e.target;
            const li = target.closest('.daily-event-item');
            if (!li || li.classList.contains('event-type-holiday')) return;
            const eventId = li.dataset.eventId;
            const eventType = li.classList.contains('event-type-anniversary') ? 'anniversary' : 'event';
            const id = eventId.toString().replace('a_', '');

            if (target.classList.contains('delete-btn')) {
                if (confirm('정말로 이 일정을 삭제하시겠습니까?')) {
                    const url = eventType === 'anniversary' ? `/api/anniversaries/${id}` : `/api/events/${id}`;
                    handleApiAction(url, { method: 'DELETE', credentials: 'include' });
                }
            } else if (target.classList.contains('edit-btn')) {
                const newTitle = prompt('새로운 일정 내용을 입력하세요:', li.querySelector('.event-title').textContent);
                if (newTitle && newTitle.trim() !== '') {
                    const url = eventType === 'anniversary' ? `/api/anniversaries/${id}` : `/api/events/${id}`;
                    handleApiAction(url, { method: 'PUT', headers: {'Content-Type': 'application/json'}, credentials: 'include', body: JSON.stringify({ title: newTitle.trim() }) });
                }
            }
        });
        
        document.addEventListener('auth-checked', () => {
            showView('calendar');
            renderCalendar();
        });
    </script>
</body>
</html>
