<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 캘린더 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background-color: var(--color-border-light);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .day-header {
            background-color: #f9fafb;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }
        .day-cell {
            background-color: white;
            min-height: 120px;
            padding: 8px;
            transition: var(--transition-base);
            cursor: pointer;
        }
        .day-cell:hover {
            background-color: #f7faff;
        }
        .day-cell.today {
            background-color: #f0f7ff;
        }
        .day-cell.today .day-num {
            color: var(--color-primary);
            font-weight: 800;
        }
        .day-num {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        .day-cell.sat .day-num { color: #3182f6; }
        .day-cell.sun .day-num { color: var(--color-red); }
        .day-cell.other-month { opacity: 0.4; }
        
        .event-tag {
            font-size: 0.75rem;
            padding: 3px 6px;
            border-radius: 4px;
            color: white;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <h2 id="current-month-label" style="font-size: 1.75rem;">2024년 5월</h2>
                    <div style="display: flex; gap: 8px;">
                        <button class="toss-button" onclick="changeMonth(-1)" style="padding: 8px 12px;"> < </button>
                        <button class="toss-button" onclick="changeMonth(1)" style="padding: 8px 12px;"> > </button>
                    </div>
                </div>
                <button class="toss-button primary" onclick="openEventAddModal()">일정 추가</button>
            </div>

            <div class="calendar-grid" id="calendar-grid">
                <!-- Header days -->
                <div class="day-header">일</div>
                <div class="day-header">월</div>
                <div class="day-header">화</div>
                <div class="day-header">수</div>
                <div class="day-header">목</div>
                <div class="day-header">금</div>
                <div class="day-header">토</div>
                <!-- Day cells will be injected here -->
            </div>
        </main>
    </div>

    <script>
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        async function renderCalendar() {
            const gridEl = document.getElementById('calendar-grid');
            const labelEl = document.getElementById('current-month-label');
            labelEl.textContent = `${currentYear}년 ${currentMonth + 1}월`;
            
            // Clear previous day cells (keep first 7 header cells)
            while (gridEl.children.length > 7) gridEl.removeChild(gridEl.lastChild);

            try {
                const events = await api.get(`/events?year=${currentYear}&month=${currentMonth + 1}`);
                
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
                const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

                // Fill previous month days
                for (let i = firstDay - 1; i >= 0; i--) {
                    const day = document.createElement('div');
                    day.className = 'day-cell other-month';
                    day.innerHTML = `<span class="day-num">${prevLastDate - i}</span>`;
                    gridEl.appendChild(day);
                }

                // Fill current month days
                const today = new Date();
                const isThisMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;

                for (let d = 1; d <= lastDate; d++) {
                    const day = document.createElement('div');
                    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
                    day.className = 'day-cell';
                    if (isThisMonth && today.getDate() === d) day.classList.add('today');
                    if (dayOfWeek === 0) day.classList.add('sun');
                    if (dayOfWeek === 6) day.classList.add('sat');

                    day.innerHTML = `<span class="day-num">${d}</span>`;
                    
                    // Add events
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = events.filter(e => e.date === dateStr);
                    
                    dayEvents.forEach(e => {
                        const tag = document.createElement('div');
                        tag.className = 'event-tag';
                        tag.textContent = e.title;
                        tag.style.backgroundColor = e.type === 'anniversary' ? 'var(--color-green)' : 'var(--color-primary)';
                        day.appendChild(tag);
                    });

                    day.onclick = () => openEventDetail(dateStr, dayEvents);
                    gridEl.appendChild(day);
                }

                // Fill next month days
                const remainingCells = 42 - (gridEl.children.length - 7);
                for (let i = 1; i <= remainingCells; i++) {
                    const day = document.createElement('div');
                    day.className = 'day-cell other-month';
                    day.innerHTML = `<span class="day-num">${i}</span>`;
                    gridEl.appendChild(day);
                }

            } catch (error) {
                console.error('Calendar render failed:', error);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        function openEventAddModal() {
            if (!currentUser) return alert('로그인이 필요합니다.');
            const title = prompt('일정 제목을 입력하세요:');
            const date = prompt('날짜를 입력하세요 (YYYY-MM-DD):', `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`);
            if (title && date) {
                api.post('/events', { title, date, type: 'event' }).then(() => renderCalendar());
            }
        }

        function openEventDetail(date, dayEvents) {
            if (dayEvents.length > 0) {
                alert(`${date}\n---\n${dayEvents.map(e => `• ${e.title}`).join('\n')}`);
            }
        }

        document.addEventListener('auth-checked', renderCalendar);
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
