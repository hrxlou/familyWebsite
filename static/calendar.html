<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 캘린더 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=3.1">

    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>


    <div class="page-content-wrapper">
        <main class="toss-main">
            <section class="content-section">
                <div class="flex-between mb-40">
                    <div class="flex-center gap-16" style="position: relative;">
                        <h2 id="current-month-label" style="font-size: 1.75rem; cursor: pointer; user-select: none;" onclick="toggleDatePicker()">2024년 5월 ▾</h2>
                        <!-- Date Picker Overlay -->
                        <div id="date-picker-overlay" class="content-section" style="display: none; position: absolute; top: 50px; left: 0; z-index: 100; min-width: 300px; padding: 24px; box-shadow: var(--shadow-lg);">
                            <div class="flex-column gap-16">
                                <div>
                                    <label style="display: block; font-size: 0.85rem; color: var(--color-text-tertiary); margin-bottom: 8px;">연도 선택</label>
                                    <div id="year-selector" class="flex-center gap-8" style="flex-wrap: wrap; justify-content: flex-start;"></div>
                                </div>
                                <div>
                                    <label style="display: block; font-size: 0.85rem; color: var(--color-text-tertiary); margin-bottom: 8px;">월 선택</label>
                                    <div id="month-selector" class="flex-center gap-8" style="flex-wrap: wrap; justify-content: flex-start;"></div>
                                </div>
                            </div>
                        </div>
                        <div class="flex-center gap-8">
                            <button class="toss-button" onclick="changeMonth(-1)" style="padding: 8px 12px;"> < </button>
                            <button class="toss-button" onclick="changeMonth(1)" style="padding: 8px 12px;"> > </button>
                        </div>
                    </div>
                </div>

                <div class="calendar-grid" id="calendar-grid">
                    <!-- Header days -->
                    <div class="day-header">일</div>
                    <div class="day-header">월</div>
                    <div class="day-header">화</div>
                    <div class="day-header">수</div>
                    <div class="day-header">목</div>
                    <div class="day-header">금</div>
                    <div class="day-header">토</div>
                    <!-- Day cells will be injected here -->
                </div>
            </section>
        </main>
    </div>


    <!-- 일정 상세 및 추가 모달 -->
    <div id="event-modal" class="modal">
        <div class="modal-content">
            <div class="flex-between mb-24">
                <h2 id="modal-date-label" style="font-size: 1.5rem;">2024년 05월 12일</h2>
                <button onclick="closeEventModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--color-text-tertiary);">&times;</button>
            </div>
            
            <div id="modal-event-list" class="flex-column gap-8 mb-24">
                <!-- 일정 목록이 여기에 주입됨 -->
            </div>

            <div class="mt-24 pt-24" style="border-top: 1px solid var(--color-border-light);">
                <h3 style="font-size: 1rem; margin-bottom: 12px;">새 일정 추가 📌</h3>
                <div class="flex-column gap-16">
                    <input type="text" id="new-event-title" class="toss-input" placeholder="일정 제목을 입력하세요">
                    
                    <div id="category-selector" class="flex-center gap-8" style="flex-wrap: wrap; justify-content: flex-start;">
                        <div class="category-chip selected" data-value="event" onclick="selectCategoryChip(this)">
                            <span class="dot" style="background: var(--color-primary);"></span>가족 행사
                        </div>
                        <div class="category-chip" data-value="anniversary" onclick="selectCategoryChip(this)">
                            <span class="dot" style="background: #2ecc71;"></span>기념일
                        </div>
                        <div class="category-chip" data-value="holiday" onclick="selectCategoryChip(this)">
                            <span class="dot" style="background: var(--color-red);"></span>휴일
                        </div>
                        <div class="category-chip" data-value="others" onclick="selectCategoryChip(this)">
                            <span class="dot" style="background: var(--color-text-tertiary);"></span>기타
                        </div>
                    </div>
                    
                    <div class="flex-between items-center">
                        <label class="flex-center gap-8" style="cursor:pointer; font-size:0.95rem; color: var(--color-text-secondary);">
                            <input type="checkbox" id="new-event-repeat" value="yearly" style="width: 18px; height: 18px;"> 매년 반복
                        </label>
                        <label class="flex-center gap-8" style="cursor:pointer; font-size:0.95rem; color: var(--color-text-secondary);">
                            <input type="checkbox" id="new-event-lunar" value="lunar" style="width: 18px; height: 18px;"> 음력으로 계산
                        </label>
                    </div>

                    <button class="toss-button primary w-full" onclick="saveEventFromModal()">일정 등록하기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = '';

        let allFetchData = [];

        // Category colors
        const categoryColors = {
            'holiday': 'var(--color-red)',
            'anniversary': '#2ecc71', // Green
            'event': 'var(--color-primary)', // Blue
            'others': 'var(--color-text-tertiary)' // Gray
        };

        async function renderCalendar() {
            const gridEl = document.getElementById('calendar-grid');
            const labelEl = document.getElementById('current-month-label');
            labelEl.textContent = `${currentYear}년 ${currentMonth + 1}월 ▾`;
            
            // 데이터 피커 닫기
            document.getElementById('date-picker-overlay').style.display = 'none';
            
            while (gridEl.children.length > 7) gridEl.removeChild(gridEl.lastChild);
            
            // Add a simple loading state
            const loadingCell = document.createElement('div');
            loadingCell.className = 'day-cell';
            loadingCell.style.gridColumn = '1 / span 7';
            loadingCell.style.textAlign = 'center';
            loadingCell.style.padding = '40px';
            loadingCell.innerHTML = '<div class="skeleton-text skeleton" style="width:200px; margin: 0 auto;"></div>';
            gridEl.appendChild(loadingCell);

            try {
                const events = await api.get(`/events?year=${currentYear}&month=${currentMonth + 1}`);
                allFetchData = events;
                
                // Remove loading state
                gridEl.removeChild(loadingCell);
                
                const firstDay = new Date(currentYear, currentMonth, 1).getDay();
                const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
                const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

                for (let i = firstDay - 1; i >= 0; i--) {
                    const day = document.createElement('div');
                    day.className = 'day-cell other-month';
                    day.innerHTML = `<span class="day-num">${prevLastDate - i}</span>`;
                    gridEl.appendChild(day);
                }

                const today = new Date();
                const isThisMonth = today.getFullYear() === currentYear && today.getMonth() === currentMonth;

                for (let d = 1; d <= lastDate; d++) {
                    const day = document.createElement('div');
                    const dayOfWeek = new Date(currentYear, currentMonth, d).getDay();
                    day.className = 'day-cell';
                    if (isThisMonth && today.getDate() === d) day.classList.add('today');
                    if (dayOfWeek === 0) day.classList.add('sun');
                    if (dayOfWeek === 6) day.classList.add('sat');

                    day.innerHTML = `<span class="day-num">${d}</span>`;
                    
                    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayEvents = events.filter(e => e.date === dateStr);
                    
                    dayEvents.forEach(e => {
                        const tag = document.createElement('div');
                        tag.className = 'event-tag';
                        const lunarIcon = e.is_lunar ? '🌙 ' : '';
                        const repeatIcon = e.repeat_type === 'yearly' ? '🔄 ' : '';
                        tag.textContent = lunarIcon + repeatIcon + e.title;
                        
                        // Use category color
                        const category = e.category || 'others';
                        tag.style.backgroundColor = categoryColors[category] || categoryColors['others'];
                        
                        day.appendChild(tag);
                    });

                    day.onclick = () => openEventDetail(dateStr, dayEvents);
                    gridEl.appendChild(day);
                }

                const remainingCells = 42 - (gridEl.children.length - 7);
                for (let i = 1; i <= remainingCells; i++) {
                    const day = document.createElement('div');
                    day.className = 'day-cell other-month';
                    day.innerHTML = `<span class="day-num">${i}</span>`;
                    gridEl.appendChild(day);
                }

            } catch (error) {
                console.error('Calendar render failed:', error);
                gridEl.innerHTML = `<div style="grid-column: 1 / span 7; padding: 40px; text-align: center; color: var(--color-red);">
                    캘린더를 불러오지 못했습니다: ${error.message}<br>
                    <button class="toss-button" onclick="renderCalendar()" style="margin-top: 16px;">다시 시도</button>
                </div>`;
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        function openEventDetail(date, dayEvents) {
            selectedDate = date;
            const modal = document.getElementById('event-modal');
            const dateLabel = document.getElementById('modal-date-label');
            const listEl = document.getElementById('modal-event-list');
            
            const [y, m, d] = date.split('-');
            dateLabel.textContent = `${y}년 ${m}월 ${d}일`;
            
            listEl.innerHTML = '';
            if (dayEvents.length === 0) {
                listEl.innerHTML = '<p style="color: var(--color-text-tertiary); text-align: center; padding: 20px;">등록된 일정이 없습니다.</p>';
            } else {
                dayEvents.forEach(e => {
                    const item = document.createElement('div');
                    item.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--color-bg-input); border-radius: 12px;';

                    const category = e.category || 'others';
                    const icon = category === 'holiday' ? '🇰🇷' : (category === 'anniversary' ? '🎂' : (category === 'event' ? '📌' : '🗓️'));
                    const repeatText = e.repeat_type === 'yearly' ? ' (매년)' : '';
                    const lunarInfo = e.lunar_info || '';
                    
                    item.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span>${icon}</span>
                            <span style="font-weight: 600; color: var(--color-text-primary);">${e.title}${lunarInfo}${repeatText}</span>
                        </div>
                    `;
                    
                    // 삭제 버튼 (본인 일정 또는 관리자만)
                    if (currentUser && category !== 'holiday') {
                        const delBtn = document.createElement('button');
                        delBtn.innerHTML = '&times;';
                        delBtn.style.cssText = 'background: none; border: none; color: var(--color-red); font-size: 1.2rem; cursor: pointer; padding: 0 4px;';
                        
                        // Legacy handling for IDs starting with 'a_'
                        const idValue = e.id.toString().includes('_') ? e.id.split('_')[1] : e.id;
                        const typeForDelete = e.id.toString().startsWith('a_') ? 'anniversary' : 'event';
                        delBtn.onclick = () => deleteItem(idValue, typeForDelete);
                        item.appendChild(delBtn);
                    } else if (category === 'holiday') {
                        const tag = document.createElement('span');
                        tag.textContent = '공휴일';
                        tag.style.cssText = 'font-size: 0.75rem; color: var(--color-red); background: rgba(240, 68, 82, 0.1); padding: 2px 6px; border-radius: 4px;';
                        item.appendChild(tag);
                    }
                    
                    listEl.appendChild(item);
                });
            }
            
            modal.style.display = 'flex';
        }

        function closeEventModal() {
            document.getElementById('event-modal').style.display = 'none';
            document.getElementById('new-event-title').value = '';
            document.getElementById('new-event-repeat').checked = false;
            document.getElementById('new-event-lunar').checked = false;
        }

        function selectCategoryChip(el) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function saveEventFromModal() {
            if (!currentUser) return showToast('로그인이 필요합니다.', 'error');
            const title = document.getElementById('new-event-title').value.trim();
            if (!title) return showToast('일정 제목을 입력하세요.', 'error');
            
            const selectedChip = document.querySelector('.category-chip.selected');
            const category = selectedChip ? selectedChip.dataset.value : 'others';
            const isYearly = document.getElementById('new-event-repeat').checked;
            const isLunar = document.getElementById('new-event-lunar').checked;
            const repeat_type = isYearly ? 'yearly' : 'none';
            
            try {
                await api.post('/events', { 
                    title, 
                    date: selectedDate,
                    category: category,
                    repeat_type: repeat_type,
                    is_lunar: isLunar
                });
                showToast('일정이 등록되었습니다.', 'success');
                closeEventModal();
                renderCalendar();
            } catch (error) {
                showToast(`추가 실패: ${error.message}`, 'error');
            }
        }

        async function deleteItem(id, type) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
                const endpoint = type === 'anniversary' ? `/anniversaries/${id}` : `/events/${id}`;
                await api.delete(endpoint);
                showToast('일정이 삭제되었습니다.', 'success');
                closeEventModal();
                renderCalendar();
            } catch (error) {
                showToast(`삭제 실패: ${error.message}`, 'error');
            }
        }

        // --- Date Picker Logic ---
        function toggleDatePicker() {
            const overlay = document.getElementById('date-picker-overlay');
            const isHidden = overlay.style.display === 'none';
            
            if (isHidden) {
                renderDatePicker();
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }

        function renderDatePicker() {
            const yearBox = document.getElementById('year-selector');
            const monthBox = document.getElementById('month-selector');
            
            if (!yearBox || !monthBox) return;
            
            yearBox.innerHTML = '';
            monthBox.innerHTML = '';

            // 연도 선택 (현재 기준 -5 ~ +5)
            const startYear = currentYear - 5;
            for(let y = startYear; y <= startYear + 10; y++) {
                const btn = document.createElement('button');
                btn.className = `toss-button ${y === currentYear ? 'primary' : 'subtle'}`;
                btn.style.cssText = 'padding: 6px 12px; font-size: 0.85rem; height: auto;';
                btn.textContent = `${y}년`;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    currentYear = y;
                    renderDatePicker();
                    renderCalendar();
                };
                yearBox.appendChild(btn);
            }

            // 월 선택
            for(let m = 0; m < 12; m++) {
                const btn = document.createElement('button');
                btn.className = `toss-button ${m === currentMonth ? 'primary' : 'subtle'}`;
                btn.style.cssText = 'padding: 6px 12px; font-size: 0.85rem; height: auto;';
                btn.textContent = `${m + 1}월`;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    currentMonth = m;
                    renderDatePicker();
                    renderCalendar();
                };
                monthBox.appendChild(btn);
            }
        }

        window.onclick = (event) => {
            const modal = document.getElementById('event-modal');
            if (event.target === modal) closeEventModal();
        };

        document.addEventListener('auth-checked', async () => {
            await renderCalendar();
            
            // URL 파라미터 확인 (?date=YYYY-MM-DD)
            const params = new URLSearchParams(window.location.search);
            const targetDate = params.get('date');
            if (targetDate) {
                const [y, m, d] = targetDate.split('-').map(Number);
                if (y && m) {
                    currentYear = y;
                    currentMonth = m - 1;
                    await renderCalendar();
                    
                    // 해당 날짜의 일정을 찾아 모달 열기
                    const dateStr = targetDate;
                    const dateEvents = allFetchData.filter(e => e.date === dateStr);
                    openEventDetail(dateStr, dateEvents);
                }
            }
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
