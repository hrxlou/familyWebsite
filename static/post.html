<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>게시글 보기 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.3">

    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>


    <div class="page-content-wrapper">
        <main class="toss-main">
            <article class="content-section">
                <div id="post-header" class="section-header-border">
                    <h2 id="post-title" style="font-size: 2rem; margin-bottom: 16px;">게시글을 불러오는 중...</h2>
                    <div class="flex-between">
                        <div class="flex-center gap-12 font-small color-tertiary">
                            <span id="post-author" class="author-label" style="font-size: 0.95rem;">...</span>
                            <span>·</span>
                            <span id="post-date">...</span>
                        </div>
                        <div id="post-actions" class="flex-center gap-8" style="display: none;">
                            <button class="toss-button" onclick="deletePost()" style="color: var(--color-red); background: rgba(240, 68, 82, 0.1);">삭제</button>
                        </div>
                    </div>
                </div>

                <div id="post-content" style="font-size: 1.125rem; line-height: 1.8; color: var(--color-text-primary); min-height: 200px;"></div>
                
                <div id="post-image-container" style="margin-top: 32px;"></div>

                <!-- Tags if any -->
                <div id="post-tags" style="margin-top: 40px; display: flex; gap: 8px;"></div>
            </article>

            <!-- Comments Section -->
            <section class="content-section mt-48">
                <h3 class="mb-24" style="font-size: 1.25rem;">댓글 <span id="comment-count" style="color: var(--color-primary);">0</span></h3>
                
                <div id="comment-list" class="flex-column gap-16 mb-32"></div>

                <div id="comment-form" style="display: none;">
                    <div class="flex-center gap-12">
                        <textarea id="comment-input" class="toss-input" placeholder="따뜻한 댓글을 남겨주세요." style="flex: 1; min-height: 80px;"></textarea>
                        <button class="toss-button primary" onclick="submitComment()" style="height: 80px; width: 80px;">등록</button>
                    </div>
                </div>
                <div id="comment-login-msg" class="accent-card text-center">
                    댓글을 쓰려면 <a href="/login.html" class="subtle-link highlight">로그인</a>이 필요합니다.
                </div>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>


    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function loadPost() {
            if (!postId) return window.location.href = '/board.html';

            try {
                const post = await api.get(`/posts/${postId}`);
                document.title = `${post.title} - 우리 가족`;
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-author').textContent = post.author_nickname;
                document.getElementById('post-date').textContent = post.created_at || '';
                document.getElementById('post-content').innerHTML = post.content.replace(/\n/g, '<br>');
                
                if (post.image_url) {
                    document.getElementById('post-image-container').innerHTML = `
                        <img src="${post.image_url}" style="max-width: 100%; border-radius: 20px; box-shadow: var(--shadow-md);">
                    `;
                }

                if (post.tags) {
                    const tagsContainer = document.getElementById('post-tags');
                    post.tags.split(',').forEach(tag => {
                        const span = document.createElement('span');
                        span.className = 'tag-badge';
                        span.textContent = `#${tag.trim()}`;
                        tagsContainer.appendChild(span);
                    });
                }

                if (currentUser && (currentUser.username === 'admin' || currentUser.username === post.author_username)) {
                    document.getElementById('post-actions').style.display = 'flex';
                }

                renderComments(post.comments || []);
            } catch (error) {
                alert(`게시글을 불러올 수 없습니다: ${error.message}`);
                window.location.href = '/board.html';
            }
        }

        function renderComments(comments) {
            const listEl = document.getElementById('comment-list');
            const countEl = document.getElementById('comment-count');
            listEl.innerHTML = '';
            countEl.textContent = comments.length;

            if (comments.length === 0) {
                listEl.innerHTML = '<div class="empty-state" style="padding: 24px;">첫 댓글을 남겨보세요!</div>';
                return;
            }


            comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'accent-card';
                div.style.position = 'relative';
                div.innerHTML = `
                    <div style="font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; color: var(--color-text-primary);">${c.author_nickname}</div>
                    <div style="font-size: 0.95rem; line-height: 1.5; color: var(--color-text-secondary);">${c.content.replace(/\n/g, '<br>')}</div>
                    <div style="font-size: 0.75rem; color: var(--color-text-tertiary); margin-top: 8px;">${c.created_at || ''}</div>
                `;
                listEl.appendChild(div);
            });
        }

        async function submitComment() {
            const content = document.getElementById('comment-input').value.trim();
            if (!content) return;

            try {
                await api.post(`/posts/${postId}/comments`, { content });
                document.getElementById('comment-input').value = '';
                loadPost();
            } catch (error) {
                alert(`댓글 등록 실패: ${error.message}`);
            }
        }

        async function deletePost() {
            if (!confirm('게시글을 삭제하시겠습니까?')) return;
            try {
                await api.delete(`/posts/${postId}`);
                window.location.href = '/board.html';
            } catch (error) {
                alert(`삭제 실패: ${error.message}`);
            }
        }

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('comment-form').style.display = 'block';
                document.getElementById('comment-login-msg').style.display = 'none';
            }
            loadPost();
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
