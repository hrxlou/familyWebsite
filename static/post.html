<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글 읽기 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .post-detail {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        .post-detail h2 {
            margin-top: 0;
            color: #191f28;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .post-meta {
            color: #8b95a1;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f2f4f6;
        }
        .post-content {
            color: #333d4b;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 2rem;
        }
        .post-image {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .comments-section {
            background-color: #f9fafb;
            padding: 1.5rem;
            border-radius: 12px;
        }
        .comment-item {
            padding: 1rem 0;
            border-bottom: 1px solid #e5e8eb;
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-meta {
            font-weight: 600;
            color: #191f28;
            margin-bottom: 0.3rem;
        }
        .comment-content {
            color: #4e5968;
            margin: 0;
        }
        .comment-form {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .comment-input {
            flex: 1;
        }
        .comment-submit {
            white-space: nowrap;
            width: auto;
        }
    </style>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/" style="text-decoration: none; color: inherit;">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div id="loading" style="text-align: center; color: #8b95a1; padding: 2rem;">게시글을 불러오는 중입니다...</div>
            <div id="post-container" style="display: none;">
                <article class="post-detail">
                    <h2 id="post-title"></h2>
                    <div class="post-meta" id="post-meta"></div>
                    <img id="post-image" class="post-image" style="display: none;" alt="첨부 이미지">
                    <div class="post-content" id="post-content"></div>
                </article>

                <section class="comments-section">
                    <h3 style="margin-top: 0; margin-bottom: 1rem; font-size: 1.2rem;">댓글</h3>
                    <div id="comments-list"></div>
                    
                    <form id="comment-form" class="comment-form" style="display: none;">
                        <input type="text" id="comment-input" class="toss-input comment-input" placeholder="댓글을 남겨보세요." required>
                        <button type="submit" class="toss-button primary comment-submit">등록</button>
                    </form>
                    <div id="login-prompt" style="text-align: center; margin-top: 1.5rem; color: #8b95a1;">
                        댓글을 작성하려면 <a href="/login.html" class="subtle-link">로그인</a>해 주세요.
                    </div>
                </section>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <button onclick="history.back()" class="toss-button" style="background-color: #f2f4f6; color: #4e5968;">목록으로 돌아가기</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function loadPost() {
            if (!postId) {
                alert('잘못된 접근입니다.');
                window.location.href = '/board.html';
                return;
            }

            try {
                const post = await api.get(`/posts/${postId}`);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('post-container').style.display = 'block';
                
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-meta').innerHTML = `작성자: <strong>${post.author_nickname}</strong>`;
                document.getElementById('post-content').textContent = post.content;
                
                if (post.image_url) {
                    const imgEl = document.getElementById('post-image');
                    imgEl.src = post.image_url;
                    imgEl.style.display = 'block';
                }

                renderComments(post.comments);
            } catch (error) {
                alert(`게시글을 불러올 수 없습니다: ${error.message}`);
                window.location.href = '/board.html';
            }
        }

        function renderComments(comments) {
            const listEl = document.getElementById('comments-list');
            listEl.innerHTML = '';
            
            if (!comments || comments.length === 0) {
                listEl.innerHTML = '<p style="color: #8b95a1; text-align: center;">가장 먼저 댓글을 남겨보세요!</p>';
                return;
            }

            comments.forEach(comment => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-meta">${comment.author_nickname}</div>
                    <p class="comment-content">${comment.content}</p>
                `;
                listEl.appendChild(div);
            });
        }

        document.getElementById('comment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            try {
                await api.post(`/posts/${postId}/comments`, { content });
                input.value = '';
                loadPost(); // 댓글 등록 후 다시 불러오기
            } catch (error) {
                alert(`댓글 등록 실패: ${error.message}`);
            }
        });

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('comment-form').style.display = 'flex';
                document.getElementById('login-prompt').style.display = 'none';
            }
        });

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
