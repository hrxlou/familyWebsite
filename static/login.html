<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .find-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .find-links a {
            color: #4e5968;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .find-links a:hover {
            text-decoration: underline;
        }
        .separator {
            width: 100%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.1);
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="page-content-wrapper" style="max-width: 400px; margin-top: 5rem;">
        <main class="toss-main">
            <section class="content-section">
                <h2 style="text-align: center;">로그인</h2>
                <form id="login-form">
                    <div style="margin-bottom: 1rem;">
                        <input type="text" id="username" class="toss-input" placeholder="아이디" required>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <input type="password" id="password" class="toss-input" placeholder="비밀번호" required>
                    </div>
                    <button type="submit" class="toss-button primary full-width">로그인</button>
                </form>
                <div class="find-links">
                    <a href="/find_id.html">아이디 찾기</a>
                    <span>|</span>
                    <a href="/reset_password.html">비밀번호 재설정</a>
                </div>
                <div style="text-align: center;">
                    <a href="/signup.html" class="subtle-link">아직 계정이 없으신가요? 회원가입</a>
                </div>

                <!-- [수정] 구분선과 메인 화면으로 돌아가는 버튼을 가장 아래로 이동 -->
                <div class="separator"></div>
                <a href="/" class="toss-button full-width" style="background-color: #f2f4f6; color: #4e5968;">🏡 메인 화면으로</a>

            </section>
        </main>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                if (response.ok) {
                    alert('로그인 되었습니다!');
                    window.location.href = '/';
                } else {
                    const errorData = await response.json();
                    alert(`로그인 실패: ${errorData.error}`);
                }
            } catch (error) {
                alert('로그인 요청 중 오류가 발생했습니다.');
            }
        });
    </script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</html>
