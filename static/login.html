<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>로그인 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=3.1">
    <script src="api.js"></script>
    <script src="components.js" defer></script>
    <script src="shared.js" defer></script>
</head>

<body>
    <div class="page-content-wrapper">
        <div class="auth-wrapper">
            <h1 class="mb-16" style="font-size: 2rem;">
                <a href="/" style="text-decoration: none; color: var(--color-primary);">👨‍👩‍👧‍👦 우리 가족</a>
            </h1>
            <p class="mb-32" style="color: var(--color-text-secondary);">다시 오신 것을 환영합니다!</p>

            <div class="auth-card">
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <div class="text-left mb-24">
                        <label class="form-label-auth">아이디 (Username)</label>
                        <input type="text" id="username" class="toss-input" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="text-left mb-32">
                        <label class="form-label-auth">비밀번호 (Password)</label>
                        <input type="password" id="password" class="toss-input" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" id="login-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">로그인</button>
                </form>

                <div class="auth-footer-links" style="margin-top: 48px; border-top: 1px solid var(--color-border-light); padding-top: 24px;">
                    <a href="/signup.html" class="subtle-link">회원가입</a>
                    <span class="divider">|</span>
                    <a href="/find_id.html" class="subtle-link">아이디 찾기</a>
                    <span class="divider">|</span>
                    <a href="/reset_password.html" class="subtle-link">비밀번호 재설정</a>
                </div>
            </div>
            
            <a href="/" class="subtle-link" style="margin-top: 32px; display: inline-block;">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return;

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            try {
                await api.post('/login', { username, password });
                showToast('반갑습니다! 로그인되었습니다.', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (error) {
                showToast(`로그인 실패: ${error.message}`, 'error');
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
