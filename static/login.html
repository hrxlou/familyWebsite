<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>로그인 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .auth-wrapper {
            max-width: 400px;
            margin: 60px auto;
            text-align: center;
        }
        .auth-card {
            background: var(--color-bg-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--color-border-light);
            backdrop-filter: blur(var(--glass-blur));
        }
    </style>
</head>
<body>
    <div class="page-content-wrapper">
        <div class="auth-wrapper">
            <h1 style="font-size: 2rem; margin-bottom: 12px; color: var(--color-primary);">👨‍👩‍👧‍👦 우리 가족</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: 32px;">다시 오신 것을 환영합니다!</p>

            <div class="auth-card">
                <form onsubmit="event.preventDefault(); handleLogin();">
                    <div style="text-align: left; margin-bottom: 24px;">
                        <label style="font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.9rem;">아이디 (Username)</label>
                        <input type="text" id="username" class="toss-input" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div style="text-align: left; margin-bottom: 32px;">
                        <label style="font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.9rem;">비밀번호 (Password)</label>
                        <input type="password" id="password" class="toss-input" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" id="login-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">로그인</button>
                </form>

                <div class="auth-footer-links">
                    <a href="/signup.html" class="subtle-link">회원가입</a>
                    <span class="divider">|</span>
                    <a href="/find_id.html" class="subtle-link">아이디 찾기</a>
                    <span class="divider">|</span>
                    <a href="/reset_password.html" class="subtle-link">비밀번호 재설정</a>
                </div>
            </div>
            
            <a href="/" class="subtle-link" style="margin-top: 32px; display: inline-block;">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return;

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            try {
                await api.post('/login', { username, password });
                window.location.href = '/';
            } catch (error) {
                alert(`로그인 실패: ${error.message}`);
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
