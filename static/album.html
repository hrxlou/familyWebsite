<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 앨범 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .photo-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            position: relative;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: 1px solid var(--color-border-light);
        }
        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }
        .photo-card .info {
            padding: 16px;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            background: var(--color-bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            color: var(--color-red);
            cursor: pointer;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 0.75rem;
            opacity: 0;
            transition: var(--transition-base);
            box-shadow: var(--shadow-sm);
        }
        .photo-card:hover .delete-btn {
            opacity: 1;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
    </style>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
                <div>
                    <h2 style="font-size: 1.75rem; margin-bottom: 8px;">가족 앨범 📸</h2>
                    <p style="color: var(--color-text-secondary);">가족과 함께한 소중한 순간들을 기록하세요.</p>
                </div>
                <div id="upload-section" style="display: none;">
                    <input type="file" id="photo-file" accept="image/*" style="display: none;">
                    <button id="upload-btn" class="toss-button primary" onclick="document.getElementById('photo-file').click()">사진 올리기</button>
                </div>
            </div>

            <div id="loading" style="text-align: center; color: var(--color-text-tertiary); padding: 60px;">사진을 불러오는 중입니다...</div>
            <div class="photo-grid" id="photo-grid"></div>
        </main>
    </div>

    <script>
        async function loadPhotos() {
            const gridEl = document.getElementById('photo-grid');
            const loadingEl = document.getElementById('loading');
            gridEl.innerHTML = '';
            loadingEl.style.display = 'block';

            try {
                const photos = await api.get('/photos');
                loadingEl.style.display = 'none';

                if (photos.length === 0) {
                    gridEl.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; color:var(--color-text-tertiary); padding: 80px; background:white; border-radius:20px;">업로드된 사진이 없습니다.</div>';
                    return;
                }

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <img src="${photo.url}" alt="사진">
                        <div class="info">
                            <span>올린이: <strong>${photo.uploader_nickname}</strong></span>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        window.openLightbox(photo.url);
                    };
                    
                    if (currentUser && (currentUser.username === 'admin' || currentUser.username === photo.uploader_username)) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.textContent = '삭제';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            deletePhoto(photo.id);
                        };
                        card.appendChild(delBtn);
                    }
                    
                    gridEl.appendChild(card);
                });
            } catch (error) {
                loadingEl.innerHTML = `<span style="color:var(--color-red);">사진 로딩 실패: ${error.message}</span>`;
            }
        }

        async function deletePhoto(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
                await api.delete(`/photos/${id}`);
                loadPhotos();
            } catch (error) {
                alert(`삭제 실패: ${error.message}`);
            }
        }

        document.getElementById('photo-file')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const btn = document.getElementById('upload-btn');
                btn.disabled = true;
                btn.textContent = '업로드 중...';
                await api.upload('/photos', formData);
                btn.disabled = false;
                btn.textContent = '사진 올리기';
                e.target.value = '';
                loadPhotos();
            } catch (error) {
                alert(`업로드 실패: ${error.message}`);
                document.getElementById('upload-btn').disabled = false;
            }
        });

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('upload-section').style.display = 'block';
            }
            loadPhotos();
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
