<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 앨범 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div class="flex-between items-end mb-40">
                <div>
                    <h2 style="font-size: 1.75rem; margin-bottom: 8px;">가족 앨범 📸</h2>
                    <p style="color: var(--color-text-secondary);">가족과 함께한 소중한 순간들을 기록하세요.</p>
                </div>
                <div id="upload-section" style="display: none;">
                    <input type="file" id="photo-file" accept="image/*" style="display: none;">
                    <button id="upload-btn" class="toss-button primary" onclick="document.getElementById('photo-file').click()">사진 올리기</button>
                </div>
            </div>

            <div id="loading" style="display: none;">
                <div class="photo-grid">
                    <div class="skeleton-card" style="height: 300px;">
                        <div class="skeleton" style="height: 240px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;"></div>
                        <div class="skeleton skeleton-text" style="width: 50%; margin-top: 12px;"></div>
                    </div>
                    <div class="skeleton-card" style="height: 300px;">
                        <div class="skeleton" style="height: 240px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;"></div>
                        <div class="skeleton skeleton-text" style="width: 40%; margin-top: 12px;"></div>
                    </div>
                    <div class="skeleton-card" style="height: 300px;">
                        <div class="skeleton" style="height: 240px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;"></div>
                        <div class="skeleton skeleton-text" style="width: 60%; margin-top: 12px;"></div>
                    </div>
                </div>
            </div>
            <div class="photo-grid" id="photo-grid"></div>
            <div id="album-pagination" class="flex-center gap-12 mt-40"></div>
        </main>
        <div id="footer-placeholder"></div>
    </div>

    <script>
        let albumCurrentPage = 1;

        async function loadPhotos(page = 1) {
            const gridEl = document.getElementById('photo-grid');
            const loadingEl = document.getElementById('loading');
            const paginationEl = document.getElementById('album-pagination');
            gridEl.innerHTML = '';
            paginationEl.innerHTML = '';
            loadingEl.style.display = 'block';

            try {
                const data = await api.get(`/photos?page=${page}`);
                loadingEl.style.display = 'none';
                
                const photos = data.photos || data;

                if ((Array.isArray(photos) ? photos : []).length === 0) {
                    gridEl.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">업로드된 사진이 없습니다.</div>';
                    return;
                }

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    
                    const img = document.createElement('img');
                    img.src = photo.url;
                    img.alt = '가족 사진';
                    card.appendChild(img);

                    const info = document.createElement('div');
                    info.className = 'info';
                    const nameSpan = document.createElement('span');
                    const author = photo.author_nickname || photo.uploader_nickname || '익명';
                    nameSpan.innerHTML = `올린이: <strong>${escapeHtml(author)}</strong>`;
                    
                    if (photo.type === 'post') {
                        const badge = document.createElement('span');
                        badge.style.cssText = 'font-size: 0.7rem; background: var(--color-blue); color: white; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle;';
                        badge.textContent = '게시글';
                        nameSpan.appendChild(badge);
                    }

                    const dateSpan = document.createElement('span');
                    dateSpan.style.cssText = 'font-size: 0.8rem; color: var(--color-text-quaternary);';
                    dateSpan.textContent = timeAgo(photo.created_at);
                    
                    info.appendChild(nameSpan);
                    info.appendChild(dateSpan);
                    card.appendChild(info);
                    
                    card.onclick = () => {
                        if (photo.type === 'post' && photo.link) {
                            window.location.href = photo.link;
                        } else {
                            window.openLightbox(photo.url);
                        }
                    };
                    
                    if (photo.type === 'photo' && currentUser && (currentUser.username === 'admin' || currentUser.username === photo.uploader_username)) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.textContent = '삭제';
                        delBtn.onclick = (e) => {
                            e.stopPropagation();
                            deletePhoto(photo.id.replace('photo_', ''));
                        };
                        card.appendChild(delBtn);
                    }
                    
                    gridEl.appendChild(card);
                });

                // Pagination
                if (data.has_prev) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'toss-button';
                    prevBtn.textContent = '이전';
                    prevBtn.onclick = () => loadPhotos(page - 1);
                    paginationEl.appendChild(prevBtn);
                }
                if (data.has_next) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'toss-button';
                    nextBtn.textContent = '다음';
                    nextBtn.onclick = () => loadPhotos(page + 1);
                    paginationEl.appendChild(nextBtn);
                }
                albumCurrentPage = page;

            } catch (error) {
                loadingEl.innerHTML = `<span style="color:var(--color-red);">사진 로딩 실패: ${escapeHtml(error.message)}</span>`;
            }
        }

        async function deletePhoto(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
                await api.delete(`/photos/${id}`);
                loadPhotos(albumCurrentPage);
            } catch (error) {
                alert(`삭제 실패: ${error.message}`);
            }
        }

        document.getElementById('photo-file')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const btn = document.getElementById('upload-btn');
                btn.disabled = true;
                btn.textContent = '업로드 중...';
                await api.upload('/photos', formData);
                btn.disabled = false;
                btn.textContent = '사진 올리기';
                e.target.value = '';
                loadPhotos(1);
            } catch (error) {
                alert(`업로드 실패: ${error.message}`);
                document.getElementById('upload-btn').disabled = false;
                document.getElementById('upload-btn').textContent = '사진 올리기';
            }
        });

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('upload-section').style.display = 'block';
            }
            loadPhotos(1);
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
