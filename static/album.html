<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가족 앨범 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .album-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .photo-card .info {
            padding: 0.8rem;
            font-size: 0.9rem;
            color: #4e5968;
        }
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 4px;
            color: #d93d3d;
            cursor: pointer;
            padding: 4px 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/" style="text-decoration: none; color: inherit;">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <section class="content-section">
                <div class="album-header">
                    <h2 style="margin: 0;">가족 앨범 📸</h2>
                    <div id="upload-section" style="display: none;">
                        <input type="file" id="photo-file" accept="image/*" style="display: none;">
                        <button id="upload-btn" class="toss-button primary" onclick="document.getElementById('photo-file').click()">사진 올리기</button>
                    </div>
                </div>

                <div id="loading" style="text-align: center; color: #8b95a1; padding: 2rem;">사진을 불러오는 중입니다...</div>
                <div class="photo-grid" id="photo-grid"></div>
            </section>
        </main>
    </div>

    <script>
        async function loadPhotos() {
            const gridEl = document.getElementById('photo-grid');
            const loadingEl = document.getElementById('loading');
            gridEl.innerHTML = '';
            loadingEl.style.display = 'block';

            try {
                const photos = await api.get('/photos');
                loadingEl.style.display = 'none';

                if (photos.length === 0) {
                    gridEl.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; color:#8b95a1;">업로드된 사진이 없습니다.</div>';
                    return;
                }

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `
                        <img src="${photo.url}" alt="사진">
                        <div class="info">
                            <span>올린이: ${photo.uploader_nickname}</span>
                        </div>
                    `;
                    
                    if (currentUser && (currentUser.username === 'admin' || currentUser.username === photo.uploader_username)) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.textContent = '삭제';
                        delBtn.onclick = () => deletePhoto(photo.id);
                        card.appendChild(delBtn);
                    }
                    
                    gridEl.appendChild(card);
                });
            } catch (error) {
                loadingEl.innerHTML = `<span style="color:red;">사진을 불러오지 못했습니다: ${error.message}</span>`;
            }
        }

        async function deletePhoto(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            try {
                await api.delete(`/photos/${id}`);
                loadPhotos();
            } catch (error) {
                alert(`삭제 실패: ${error.message}`);
            }
        }

        document.getElementById('photo-file')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            
            try {
                await api.upload('/photos', formData);
                alert('사진이 업로드되었습니다.');
                e.target.value = '';
                loadPhotos();
            } catch (error) {
                alert(`업로드 실패: ${error.message}`);
            }
        });

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('upload-section').style.display = 'block';
            }
            loadPhotos(); // currentUser 정보가 로드된 후 사진을 불러옴
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
