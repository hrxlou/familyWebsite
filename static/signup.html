<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>회원가입 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.3">

    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div class="page-content-wrapper">
        <div class="auth-wrapper">
            <h1 style="font-size: 2rem; margin-bottom: 12px; color: var(--color-primary);">👨‍👩‍👧‍👦 우리 가족</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: 32px;">우리 가족 멤버로 가입하세요!</p>

            <div class="auth-card">
                <form onsubmit="event.preventDefault(); handleSignup();">
                    <div class="text-left mb-24">
                        <label class="form-label-auth">아이디</label>
                        <input type="text" id="username" class="toss-input" placeholder="로그인에 사용할 아이디" required>
                    </div>
                    <div class="text-left mb-24">
                        <label class="form-label-auth">비밀번호</label>
                        <input type="password" id="password" class="toss-input" placeholder="비밀번호" required>
                    </div>
                    <div class="text-left mb-32">
                        <label class="form-label-auth">닉네임 (별명)</label>
                        <input type="text" id="nickname" class="toss-input" placeholder="가족들이 부르는 별명" required>
                    </div>
                    <button type="submit" id="signup-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">가입하기</button>
                </form>

                <div class="auth-footer-simple">
                    이미 계정이 있나요? <a href="/login.html" class="subtle-link highlight">로그인</a>
                </div>
            </div>
            
            <a href="/" class="subtle-link" style="margin-top: 32px; display: inline-block;">홈으로 돌아가기</a>
        </div>
    </div>

    <script>
        async function handleSignup() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            if (!username || !password || !nickname) return;

            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = '가입 중...';

            try {
                await api.post('/signup', { username, password, nickname });
                alert('회원가입이 완료되었습니다! 로그인해 주세요.');
                window.location.href = '/login.html';
            } catch (error) {
                alert(`가입 실패: ${error.message}`);
                btn.disabled = false;
                btn.textContent = '가입하기';
            }
        }
    </script>
</body>
</html>
