<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-content-wrapper" style="max-width: 400px; margin-top: 5rem;">
        <main class="toss-main">
            <section class="content-section">
                <h2 style="text-align: center;">회원가입</h2>
                <form id="signup-form">
                    <div style="margin-bottom: 1rem;">
                        <input type="text" id="username" class="toss-input" placeholder="아이디" required>
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <input type="password" id="password" class="toss-input" placeholder="비밀번호" required>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <input type="text" id="nickname" class="toss-input" placeholder="닉네임 (가족 호칭 등)" required>
                    </div>
                    <button type="submit" class="toss-button primary full-width">가입하기</button>
                </form>
                 <div style="text-align: center;">
                    <a href="/login.html" class="subtle-link">이미 계정이 있으신가요? 로그인</a>
                </div>
            </section>
        </main>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const nickname = document.getElementById('nickname').value;
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password, nickname })
                });
                if (response.ok) {
                    alert('회원가입 성공! 로그인 페이지로 이동합니다.');
                    window.location.href = '/login.html';
                } else {
                    const errorData = await response.json();
                    alert(`회원가입 실패: ${errorData.error}`);
                }
            } catch (error) {
                console.error('회원가입 요청 오류:', error);
                alert('회원가입 요청 중 오류가 발생했습니다.');
            }
        });
    </script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
