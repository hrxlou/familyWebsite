<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nav-welcome-msg { margin-right: 1rem; font-weight: 500; color: #333d4b; white-space: nowrap; }
        #nav-user-section .toss-button { margin-left: 0.5rem; }
        .profile-avatar-svg { width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(0, 112, 243, 0.6); box-shadow: 0 6px 16px rgba(0,0,0,0.15); padding: 25px; box-sizing: border-box; background-color: #e9ecef; }
    </style>
</head>
<body>
    <header class="toss-header">
        <h1><a href="/" style="text-decoration:none; color:inherit;">🏡 우리 가족</a></h1>
        <nav class="toss-nav">
            <ul>
                <li><a href="/">홈</a></li>
                <li><a href="/album.html">앨범</a></li>
                <li><a href="/board.html">게시판</a></li>
                <li><a href="/calendar.html">캘린더</a></li>
            </ul>
        </nav>
        <div id="nav-user-section"></div>
    </header>
    <div class="page-content-wrapper">
        <main class="toss-main">
            <section id="profile-card-section" class="content-section profile-card" style="text-align: center;">
                <p>프로필 정보를 불러오는 중...</p>
            </section>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        const profileSection = document.getElementById('profile-card-section');
        let currentProfileData = null;

        function renderProfileView(profileData) {
            let avatarHTML;
            if (profileData.avatar_url) {
                avatarHTML = `<img src="${profileData.avatar_url}" alt="프로필 아바타" class="profile-avatar">`;
            } else if (profileData.username === 'admin') {
                avatarHTML = `<svg class="profile-avatar-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
            } else {
                avatarHTML = `<img src="https://placehold.co/120x120/0070F3/FFFFFF?text=${profileData.nickname.charAt(0)}" alt="프로필 아바타" class="profile-avatar">`;
            }

            const editButtonHTML = (currentUser && currentUser.username === profileData.username) 
                ? `<button id="edit-profile-btn" class="toss-button primary" style="margin-top: 1rem;">프로필 수정</button>` 
                : '';

            profileSection.innerHTML = `
                <h2>프로필</h2>
                ${avatarHTML}
                <div class="profile-info">
                    <h3>${profileData.nickname}</h3>
                    <p>아이디: ${profileData.username}</p>
                    <p style="white-space: pre-wrap; color: #333d4b;">${profileData.introduction || '소개 메시지가 없습니다.'}</p>
                </div>
                ${editButtonHTML}
            `;
            
            if (editButtonHTML) {
                document.getElementById('edit-profile-btn').addEventListener('click', () => renderProfileEdit(currentProfileData));
            }
        }

        function renderProfileEdit(profileData) {
            profileSection.innerHTML = `
                <h2>프로필 수정</h2>
                <form id="profile-edit-form" class="profile-edit-form">
                    <div class="form-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" class="toss-input" value="${profileData.nickname}" required>
                    </div>
                    <div class="form-group">
                        <label for="introduction">소개 메시지</label>
                        <textarea id="introduction" class="toss-textarea">${profileData.introduction || ''}</textarea>
                    </div>
                    <div class="form-group">
                        <label>프로필 사진</label>
                        <div class="avatar-options">
                            <label><input type="radio" name="avatar_choice" value="keep" checked> 유지</label>
                            <label><input type="radio" name="avatar_choice" value="default"> 기본 아이콘으로 변경</label>
                            <label>
                                <input type="radio" name="avatar_choice" value="upload"> 새로 올리기
                                <div id="avatar-upload-area" style="display:none;">
                                    <input type="file" id="avatar_file" accept="image/*">
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="cancel-edit-btn" class="toss-button" style="background-color: #f2f4f6; color: #4e5968;">취소</button>
                        <button type="submit" class="toss-button primary">저장</button>
                    </div>
                </form>
            `;

            document.querySelector('input[name="avatar_choice"][value="upload"]').addEventListener('change', (e) => {
                document.getElementById('avatar-upload-area').style.display = e.target.checked ? 'block' : 'none';
            });
            document.getElementById('cancel-edit-btn').addEventListener('click', () => renderProfileView(currentProfileData));
            document.getElementById('profile-edit-form').addEventListener('submit', handleProfileUpdate);
        }

        async function handleProfileUpdate(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('nickname', document.getElementById('nickname').value);
            formData.append('introduction', document.getElementById('introduction').value);
            
            const avatarChoice = document.querySelector('input[name="avatar_choice"]:checked').value;
            formData.append('avatar_choice', avatarChoice);

            if (avatarChoice === 'upload') {
                const avatarFile = document.getElementById('avatar_file').files[0];
                if (avatarFile) {
                    formData.append('avatar_file', avatarFile);
                }
            }

            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    credentials: 'include',
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    alert('프로필이 업데이트되었습니다.');
                    currentProfileData = data.updated_user;
                    renderProfileView(currentProfileData);
                    checkLoginStatus(); // 헤더의 닉네임도 업데이트
                } else {
                    alert(`오류: ${data.error}`);
                }
            } catch (error) {
                alert('프로필 업데이트 중 오류가 발생했습니다.');
            }
        }

        async function initializeProfilePage() {
            const urlParams = new URLSearchParams(window.location.search);
            const usernameFromUrl = urlParams.get('username');
            try {
                const targetUsername = usernameFromUrl || (currentUser ? currentUser.username : null);
                if (!targetUsername) {
                    profileSection.innerHTML = `<h2>프로필</h2><p style="line-height: 1.6;">프로필을 보려면 <a href="/login.html">로그인</a>하시거나, <br>게시판 등에서 보고 싶은 가족의 닉네임을 클릭해주세요.</p>`;
                    return;
                }
                const response = await fetch(`/api/users/${targetUsername}`);
                if (!response.ok) throw new Error('사용자를 찾을 수 없습니다.');
                currentProfileData = await response.json();
                renderProfileView(currentProfileData);
            } catch (error) {
                profileSection.innerHTML = `<p style="color: red;">${error.message}</p>`;
            }
        }
        
        document.addEventListener('auth-checked', initializeProfilePage);
    </script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
