<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>프로필 설정 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.4">

    <script src="api.js"></script>
    <script src="components.js" defer></script>

</head>
<body>
    <div id="header-placeholder"></div>


    <div class="page-content-wrapper">
        <main class="toss-main profile-container">
            <div class="text-center mb-48">
                <h2 style="font-size: 1.75rem; margin-bottom: 8px;">내 프로필 관리 👤</h2>
                <p style="color: var(--color-text-secondary);">개인정보와 아바타를 수정할 수 있습니다.</p>
            </div>

            <section class="content-section profile-card">

                <div class="avatar-section">
                    <div class="avatar-circle">
                        <img id="avatar-preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23b0b8c1'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="아바타">
                        <input type="file" id="avatar-file" accept="image/*" style="display: none;">
                        <div class="avatar-edit-overlay" onclick="document.getElementById('avatar-file').click()">📷</div>
                    </div>
                    <p id="username-display" style="font-size: 1.1rem; font-weight: 700; color: var(--color-text-primary); margin: 0;">불러오는 중...</p>
                    <p style="font-size: 0.9rem; color: var(--color-text-tertiary); margin-top: 4px;">가족 멤버</p>
                </div>

                <form id="profile-form" onsubmit="event.preventDefault(); updateProfile();">
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label style="font-weight: 700; margin-bottom: 12px; display: block;">닉네임 (별명)</label>
                        <input type="text" id="nickname" class="toss-input" placeholder="닉네임을 입력하세요" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 24px;">
                        <label style="font-weight: 700; margin-bottom: 12px; display: block;">자기소개</label>
                        <textarea id="introduction" class="toss-input" placeholder="가족들에게 한마디 남겨보세요." style="min-height: 80px; resize: vertical;"></textarea>
                    </div>

                    <div class="form-group" style="margin-bottom: 12px; border-top: 1px solid var(--color-border-light); padding-top: 24px;">
                        <label style="font-weight: 700; margin-bottom: 12px; display: block;">새 비밀번호 <span style="font-weight: 400; color: var(--color-text-tertiary); font-size: 0.85rem;">(변경 시에만 입력)</span></label>
                        <input type="password" id="new-password" class="toss-input" placeholder="필요한 경우에만 입력하세요">
                    </div>

                    <div style="text-align: center; margin-top: 40px;">
                        <button type="submit" id="save-btn" class="toss-button primary" style="width: 200px; height: 50px; font-size: 1.1rem;">저장하기</button>
                    </div>
                </form>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>


    <script>
        async function loadProfile() {
            try {
                const user = await api.get(`/users/${currentUser.username}`);
                document.getElementById('username-display').textContent = `@${user.username}`;
                document.getElementById('nickname').value = user.nickname;
                document.getElementById('introduction').value = user.introduction || '';
                if (user.avatar_url) {
                    document.getElementById('avatar-preview').src = user.avatar_url;
                }
            } catch (error) {
                console.error('Failed to load profile:', error);
            }
        }

        async function updateProfile() {
            const nickname = document.getElementById('nickname').value.trim();
            const introduction = document.getElementById('introduction').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();
            const avatarFile = document.getElementById('avatar-file').files[0];

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            const formData = new FormData();
            formData.append('nickname', nickname);
            formData.append('introduction', introduction);
            if (newPassword) formData.append('password', newPassword);
            if (avatarFile) formData.append('avatar', avatarFile);

            try {
                await api.upload('/profile', formData, 'PUT');
                alert('프로필이 성공적으로 업데이트되었습니다.');
                window.location.reload();
            } catch (error) {
                alert(`업데이트 실패: ${error.message}`);
                btn.disabled = false;
                btn.textContent = '저장하기';
            }
        }

        document.getElementById('avatar-file').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    document.getElementById('avatar-preview').src = re.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        document.addEventListener('auth-checked', () => {
            if (!currentUser) {
                window.location.href = '/login.html';
            } else {
                loadProfile();
            }
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
