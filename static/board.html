<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 게시판 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.4">

    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>


    <div class="page-content-wrapper">
        <main class="toss-main">
            <div class="flex-between items-end mb-40">
                <div>
                    <h2 style="font-size: 1.75rem; margin-bottom: 8px;">가족 게시판 📝</h2>
                    <p style="color: var(--color-text-secondary);">우리 가족의 소소한 이야기를 나누어보세요.</p>
                </div>
                <div class="flex-center gap-24">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" class="toss-input search-input-pl" placeholder="검색어를 입력하세요">
                    </div>
                    <a href="/write.html" class="toss-button primary" id="write-btn" style="display: none; height: 40px; padding: 0 20px; font-size: 0.9rem; align-items: center; justify-content: center; text-decoration: none !important; color: white !important; border: none !important;">글쓰기</a>
                </div>
            </div>

            <section class="content-section">
                <div id="loading" style="text-align: center; color: var(--color-text-tertiary); padding: 40px; font-size: 0.95rem;">게시글을 불러오는 중입니다...</div>
                <div id="post-list" class="post-list"></div>
                
                <div id="pagination" class="flex-center gap-12 mt-40"></div>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>


    <script>
        let currentPage = 1;
        let currentSearch = '';

        async function loadPosts(page, query = '') {
            const listEl = document.getElementById('post-list');
            const paginationEl = document.getElementById('pagination');
            const loadingEl = document.getElementById('loading');
            
            listEl.innerHTML = '';
            paginationEl.innerHTML = '';
            loadingEl.style.display = 'block';

            currentSearch = query;

            try {
                const data = await api.get(`/posts?page=${page}&q=${encodeURIComponent(query)}`);
                loadingEl.style.display = 'none';
                
                if (data.posts.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">작성된 게시글이 없습니다.</div>';
                    return;
                }


                data.posts.forEach(post => {
                    const postCard = document.createElement('a');
                    postCard.href = `/post.html?id=${post.id}`;
                    postCard.className = 'post-item';
                    
                    const hasImage = post.image_url ? ' 🖼️' : '';
                    
                    postCard.innerHTML = `
                        <div class="flex-between items-start">
                            <div style="flex: 1;">
                                <h3 class="post-title">${post.title}${hasImage}</h3>
                                <div class="flex-center gap-12 font-small color-tertiary" style="justify-content: flex-start;">
                                    <span class="author-label">${post.author_nickname}</span>
                                    <span>·</span>
                                    <span>댓글 ${post.comments ? post.comments.length : 0}</span>
                                </div>
                            </div>
                            ${post.image_url ? `<img src="${post.image_url}" class="post-thumbnail">` : ''}
                        </div>
                    `;
                    listEl.appendChild(postCard);
                });

                if (data.has_prev) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'toss-button';
                    prevBtn.textContent = '이전';
                    prevBtn.onclick = () => loadPosts(page - 1, currentSearch);
                    paginationEl.appendChild(prevBtn);
                }

                if (data.has_next) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'toss-button';
                    nextBtn.textContent = '다음';
                    nextBtn.onclick = () => loadPosts(page + 1, currentSearch);
                    paginationEl.appendChild(nextBtn);
                }
                
                currentPage = page;
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                loadingEl.innerHTML = `<span style="color:var(--color-red);">게시글 로딩 실패: ${error.message}</span>`;
            }
        }

            if (currentUser) {
                document.getElementById('write-btn').style.display = 'flex';
            }

        document.addEventListener('DOMContentLoaded', () => {
            loadPosts(1);
            
            // Search input handler with debounce
            let debounceTimer;
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    loadPosts(1, e.target.value);
                }, 400);
            });
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js?v=2.4"></script>
</body>
</html>
