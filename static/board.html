<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 게시판 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
                <div>
                    <h2 style="font-size: 1.75rem; margin-bottom: 8px;">가족 게시판 📝</h2>
                    <p style="color: var(--color-text-secondary);">우리 가족의 소소한 이야기를 나누어보세요.</p>
                </div>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <div style="position: relative; width: 240px;">
                        <span style="position: absolute; left: 14px; top: 12px; color: var(--color-text-quaternary);">🔍</span>
                        <input type="text" id="search-input" class="toss-input" placeholder="검색어를 입력하세요" style="padding-left: 40px; height: 44px; font-size: 0.95rem;">
                    </div>
                    <a href="/write.html" class="toss-button primary" id="write-btn" style="display: none; height: 44px;">글쓰기</a>
                </div>
            </div>

            <section class="content-section" style="padding: 0; background: none; border: none; box-shadow: none;">
                <div id="loading" style="text-align: center; color: var(--color-text-tertiary); padding: 40px; font-size: 0.95rem;">게시글을 불러오는 중입니다...</div>
                <div id="post-list" class="post-list"></div>
                
                <div id="pagination" style="display: flex; justify-content: center; gap: 12px; margin-top: 40px;"></div>
            </section>
        </main>
    </div>

    <script>
        let currentPage = 1;
        let currentSearch = '';

        async function loadPosts(page, query = '') {
            const listEl = document.getElementById('post-list');
            const paginationEl = document.getElementById('pagination');
            const loadingEl = document.getElementById('loading');
            
            listEl.innerHTML = '';
            paginationEl.innerHTML = '';
            loadingEl.style.display = 'block';

            currentSearch = query;

            try {
                const data = await api.get(`/posts?page=${page}&q=${encodeURIComponent(query)}`);
                loadingEl.style.display = 'none';
                
                if (data.posts.length === 0) {
                    listEl.innerHTML = '<div style="text-align:center; color:var(--color-text-tertiary); padding: 60px; background: white; border-radius: 20px;">작성된 게시글이 없습니다.</div>';
                    return;
                }

                data.posts.forEach(post => {
                    const postCard = document.createElement('a');
                    postCard.href = `/post.html?id=${post.id}`;
                    postCard.className = 'post-item';
                    
                    const hasImage = post.image_url ? ' 🖼️' : '';
                    
                    postCard.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div style="flex: 1;">
                                <h3 style="font-size: 1.15rem; margin-bottom: 8px; color: var(--color-text-primary); font-weight: 700;">${post.title}${hasImage}</h3>
                                <div style="display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--color-text-tertiary);">
                                    <span style="font-weight: 600; color: var(--color-text-secondary);">${post.author_nickname}</span>
                                    <span>·</span>
                                    <span>댓글 ${post.comments ? post.comments.length : 0}</span>
                                </div>
                            </div>
                            ${post.image_url ? `<img src="${post.image_url}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-left: 20px; border: 1px solid var(--color-border-light);">` : ''}
                        </div>
                    `;
                    listEl.appendChild(postCard);
                });

                if (data.has_prev) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'toss-button';
                    prevBtn.textContent = '이전';
                    prevBtn.onclick = () => loadPosts(page - 1, currentSearch);
                    paginationEl.appendChild(prevBtn);
                }

                if (data.has_next) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'toss-button';
                    nextBtn.textContent = '다음';
                    nextBtn.onclick = () => loadPosts(page + 1, currentSearch);
                    paginationEl.appendChild(nextBtn);
                }
                
                currentPage = page;
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                loadingEl.innerHTML = `<span style="color:var(--color-red);">게시글 로딩 실패: ${error.message}</span>`;
            }
        }

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('write-btn').style.display = 'inline-block';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadPosts(1);
            
            // Search input handler with debounce
            let debounceTimer;
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    loadPosts(1, e.target.value);
                }, 400);
            });
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
