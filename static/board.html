<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>가족 게시판 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="page-content-wrapper">
        <main class="toss-main">
            <div class="flex-between items-end mb-40">
                <div>
                    <h2 style="font-size: 1.75rem; margin-bottom: 8px;">가족 게시판 📝</h2>
                    <p style="color: var(--color-text-secondary);">우리 가족의 소소한 이야기를 나누어보세요.</p>
                </div>
                <div class="flex-center gap-12">
                    <div class="flex-center gap-8 glass" style="padding: 4px 12px; border-radius: var(--radius-md); border: 1px solid var(--color-border-medium);">
                        <select id="search-type" class="toss-input" style="width: auto; border: none; background: transparent; padding: 0 8px; font-size: 0.9rem;">
                            <option value="all">전체</option>
                            <option value="title">제목</option>
                            <option value="content">내용</option>
                            <option value="author">작성자</option>
                        </select>
                        <div style="width: 1px; height: 20px; background: var(--color-border-medium);"></div>
                        <div class="search-wrapper" style="width: 200px;">
                            <span class="search-icon" style="left: 8px;">🔍</span>
                            <input type="text" id="search-input" class="toss-input" style="border: none; background: transparent; padding-left: 32px; font-size: 0.9rem;" placeholder="검색어 입력">
                        </div>
                    </div>
                    <a href="/write.html" class="toss-button primary" id="write-btn" style="display: none; height: 40px; padding: 0 20px; font-size: 0.9rem;">글쓰기</a>
                </div>
            </div>

            <section class="content-section">
                <div id="loading" style="display: none;">
                    <div class="flex-column gap-16">
                        <div class="skeleton-card" style="height: 100px;">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        </div>
                        <div class="skeleton-card" style="height: 100px;">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-text" style="width: 30%;"></div>
                        </div>
                        <div class="skeleton-card" style="height: 100px;">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-text" style="width: 50%;"></div>
                        </div>
                    </div>
                </div>
                <div id="post-list" class="post-list"></div>
                <div id="pagination" class="flex-center gap-12 mt-40"></div>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>

    <script>
        let currentPage = 1;
        let currentSearch = '';
        let currentSearchType = 'all';

        async function loadPosts(page, query = '', type = 'all') {
            const listEl = document.getElementById('post-list');
            const paginationEl = document.getElementById('pagination');
            const loadingEl = document.getElementById('loading');
            
            listEl.innerHTML = '';
            paginationEl.innerHTML = '';
            loadingEl.style.display = 'block';
            currentSearch = query;
            currentSearchType = type;

            try {
                const data = await api.get(`/posts?page=${page}&q=${encodeURIComponent(query)}&type=${type}`);
                loadingEl.style.display = 'none';
                
                if (data.posts.length === 0) {
                    listEl.innerHTML = '<div class="empty-state">작성된 게시글이 없습니다.</div>';
                    return;
                }

                data.posts.forEach(post => {
                    const postCard = document.createElement('a');
                    postCard.href = `/post.html?id=${post.id}`;
                    postCard.className = 'post-item';
                    
                    const hasImage = post.image_url ? ' 🖼️' : '';

                    // Safe content rendering
                    const outerDiv = document.createElement('div');
                    outerDiv.className = 'flex-between items-start';

                    const innerDiv = document.createElement('div');
                    innerDiv.style.flex = '1';

                    const titleH3 = document.createElement('h3');
                    titleH3.className = 'post-title';
                    titleH3.textContent = post.title + hasImage;

                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'flex-center gap-12 font-small color-tertiary';
                    metaDiv.style.justifyContent = 'flex-start';
                    metaDiv.innerHTML = `<span class="author-label">${escapeHtml(post.author_nickname)}</span><span>·</span><span>댓글 ${post.comments ? post.comments.length : 0}</span><span>·</span><span>❤️ ${post.like_count || 0}</span><span>·</span><span>${timeAgo(post.created_at)}</span>`;

                    innerDiv.appendChild(titleH3);
                    innerDiv.appendChild(metaDiv);
                    outerDiv.appendChild(innerDiv);

                    if (post.image_url) {
                        const thumb = document.createElement('img');
                        thumb.src = post.image_url;
                        thumb.className = 'post-thumbnail';
                        thumb.alt = '게시글 이미지';
                        outerDiv.appendChild(thumb);
                    }

                    postCard.appendChild(outerDiv);
                    listEl.appendChild(postCard);
                });

                if (data.has_prev) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'toss-button';
                    prevBtn.textContent = '이전';
                    prevBtn.onclick = () => loadPosts(page - 1, currentSearch, currentSearchType);
                    paginationEl.appendChild(prevBtn);
                }

                if (data.has_next) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'toss-button';
                    nextBtn.textContent = '다음';
                    nextBtn.onclick = () => loadPosts(page + 1, currentSearch, currentSearchType);
                    paginationEl.appendChild(nextBtn);
                }
                
                currentPage = page;
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                loadingEl.innerHTML = `<span style="color:var(--color-red);">게시글 로딩 실패: ${escapeHtml(error.message)}</span>`;
            }
        }

        document.addEventListener('auth-checked', () => {
            if (currentUser) {
                document.getElementById('write-btn').style.display = 'flex';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadPosts(1);
            
            let debounceTimer;
            const searchInput = document.getElementById('search-input');
            const searchTypeSelect = document.getElementById('search-type');

            const handleSearch = () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    loadPosts(1, searchInput.value, searchTypeSelect.value);
                }, 400);
            };

            searchInput.addEventListener('input', handleSearch);
            searchTypeSelect.addEventListener('change', handleSearch);
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js?v=3.0"></script>
</body>
</html>
