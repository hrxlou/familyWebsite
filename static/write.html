<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
</head>
<body>
    <header class="toss-header">
        <div class="header-inner">
            <h1 class="logo"><a href="/" style="text-decoration: none; color: inherit;">👨‍👩‍👧‍👦 우리 가족</a></h1>
            <nav id="nav-user-section" class="nav-right"></nav>
        </div>
    </header>

    <div class="page-content-wrapper" style="max-width: 600px;">
        <main class="toss-main">
            <section class="content-section">
                <h2 style="margin-top: 0; margin-bottom: 2rem; color: #191f28;">새 글 작성하기 ✍️</h2>
                
                <form id="write-form">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="title" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333d4b;">제목</label>
                        <input type="text" id="title" class="toss-input" placeholder="글 제목을 입력하세요." required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="content" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333d4b;">내용</label>
                        <textarea id="content" class="toss-input" style="height: 200px; resize: vertical;" placeholder="가족들과 나누고 싶은 이야기를 적어보세요." required></textarea>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label for="image" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333d4b;">사진 첨부 (선택)</label>
                        <input type="file" id="image" accept="image/*" style="width: 100%; padding: 0.5rem 0;">
                    </div>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button type="button" class="toss-button" style="flex: 1; background-color: #f2f4f6; color: #4e5968;" onclick="history.back()">취소</button>
                        <button type="submit" class="toss-button primary" style="flex: 2;" id="submit-btn">게시글 등록</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('auth-checked', () => {
            if (!currentUser) {
                alert('로그인이 필요한 서비스입니다.');
                window.location.href = '/login.html';
            }
        });

        document.getElementById('write-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '등록 중...';

            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const imageFile = document.getElementById('image').files[0];

            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                // Post upload expects FormData, so we use api.upload
                await api.upload('/posts', formData, 'POST');
                alert('게시글이 성공적으로 등록되었습니다.');
                window.location.href = '/board.html';
            } catch (error) {
                alert(`등록 실패: ${error.message}`);
                btn.disabled = false;
                btn.textContent = '게시글 등록';
            }
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
