<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>글쓰기 - 우리 가족</title>
    <link rel="stylesheet" href="style.css?v=2.3">
    <script src="api.js"></script>
    <script src="components.js" defer></script>
</head>

<body>
    <div id="header-placeholder"></div>


    <div class="page-content-wrapper">
        <main class="toss-main">
            <div class="mb-32">
                <h2 style="font-size: 1.75rem; margin-bottom: 8px;">소식 알리기 📝</h2>
                <p style="color: var(--color-text-secondary);">가족들에게 즐거운 이야기를 전해주세요.</p>
            </div>

            <section class="content-section" style="padding: 40px;">
                <form id="write-form" onsubmit="event.preventDefault(); submitPost();">
                    <div class="form-group mb-24">
                        <label class="form-label">제목</label>
                        <input type="text" id="title" class="toss-input" placeholder="제목을 입력하세요" required style="font-size: 1.1rem; font-weight: 600;">
                    </div>

                    <div class="form-group mb-24">
                        <label class="form-label">내용</label>
                        <textarea id="content" class="toss-input" placeholder="어떤 이야기가 있나요?" required style="min-height: 300px; resize: vertical; line-height: 1.6;"></textarea>
                    </div>

                    <div class="form-group mb-24">
                        <label class="form-label">사진 첨부 (선택)</label>
                        <input type="file" id="image" class="toss-input" accept="image/*" style="padding: 10px;">
                    </div>

                    <div class="form-group mb-40">
                        <label class="form-label">태그 (쉼표로 구분)</label>
                        <input type="text" id="tags" class="toss-input" placeholder="예: 여행, 맛집, 기념일">
                    </div>

                    <div class="flex-center gap-12" style="justify-content: flex-end;">
                        <button type="button" class="toss-button" onclick="history.back()" style="width: 120px;">취소</button>
                        <button type="submit" id="submit-btn" class="toss-button primary" style="width: 120px;">등록하기</button>
                    </div>
                </form>
            </section>
        </main>
        <div id="footer-placeholder"></div>
    </div>


    <script>
        async function submitPost() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const tags = document.getElementById('tags').value.trim();
            const imageFile = document.getElementById('image').files[0];

            if (!title || !content) return;

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '등록 중...';

            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            if (tags) formData.append('tags', tags);
            if (imageFile) formData.append('file', imageFile);

            try {
                await api.upload('/posts', formData);
                window.location.href = '/board.html';
            } catch (error) {
                alert(`등록 실패: ${error.message}`);
                btn.disabled = false;
                btn.textContent = '등록하기';
            }
        }

        document.addEventListener('auth-checked', () => {
            if (!currentUser) {
                alert('로그인이 필요한 서비스입니다.');
                window.location.href = '/login.html';
            }
        });
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
