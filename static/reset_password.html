<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .step-container { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="page-content-wrapper" style="max-width: 400px; margin-top: 5rem;">
        <main class="toss-main">
            <section class="content-section">
                
                <!-- 1단계: 사용자 인증 -->
                <div id="verification-step" class="step-container">
                    <h2 style="text-align: center;">비밀번호 재설정</h2>
                    <p style="text-align: center; color: #4e5968; margin-bottom: 1.5rem;">아이디와 닉네임을 입력하여<br>본인 인증을 진행해주세요.</p>
                    <form id="verification-form">
                        <div style="margin-bottom: 1rem;">
                            <input type="text" id="username-verify" class="toss-input" placeholder="아이디" required>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <input type="text" id="nickname-verify" class="toss-input" placeholder="닉네임" required>
                        </div>
                        <button type="submit" class="toss-button primary full-width">인증하기</button>
                    </form>
                </div>

                <!-- 2단계: 새 비밀번호 입력 (기본 숨김) -->
                <div id="reset-step" class="step-container" style="display: none;">
                    <h2 style="text-align: center;">새 비밀번호 입력</h2>
                    <p style="text-align: center; color: #4e5968; margin-bottom: 1.5rem;">인증이 완료되었습니다.<br>새로운 비밀번호를 입력해주세요.</p>
                    <form id="reset-form">
                        <div style="margin-bottom: 1.5rem;">
                            <input type="password" id="new_password" class="toss-input" placeholder="새 비밀번호" required>
                        </div>
                        <button type="submit" class="toss-button primary full-width">비밀번호 변경</button>
                    </form>
                </div>

                <div style="text-align: center; margin-top: 2rem;">
                    <a href="/login.html" class="subtle-link">로그인 페이지로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>
    <script>
        const verificationStep = document.getElementById('verification-step');
        const resetStep = document.getElementById('reset-step');
        const verificationForm = document.getElementById('verification-form');
        const resetForm = document.getElementById('reset-form');

        let verifiedUsername = null;
        let verifiedNickname = null;

        // 1단계: 인증 폼 제출 이벤트
        verificationForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username-verify').value;
            const nickname = document.getElementById('nickname-verify').value;
            try {
                const response = await fetch('/api/verify_user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nickname })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('인증에 성공했습니다. 비밀번호를 변경해주세요.');
                    verifiedUsername = username;
                    verifiedNickname = nickname;
                    verificationStep.style.display = 'none';
                    resetStep.style.display = 'block';
                } else {
                    alert(`인증 실패: ${data.error}`);
                }
            } catch (error) {
                alert('인증 요청 중 오류가 발생했습니다.');
            }
        });

        // 2단계: 비밀번호 변경 폼 제출 이벤트
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_password = document.getElementById('new_password').value;
            if (!verifiedUsername || !verifiedNickname) {
                alert('인증 정보가 올바르지 않습니다. 다시 시도해주세요.');
                return;
            }
            try {
                const response = await fetch('/api/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: verifiedUsername, 
                        nickname: verifiedNickname, 
                        new_password: new_password 
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.success);
                    window.location.href = '/login.html';
                } else {
                    alert(`오류: ${data.error}`);
                }
            } catch (error) {
                alert('요청 중 오류가 발생했습니다.');
            }
        });
    </script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
