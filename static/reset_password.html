<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .step { display: none; }
        .step.active { display: block; }
        .login-link { text-align: center; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="page-content-wrapper" style="max-width: 400px; margin-top: 5rem;">
        <main class="toss-main">
            <section class="content-section">
                <h2 style="text-align: center;">비밀번호 재설정</h2>
                
                <!-- 1단계: 사용자 인증 -->
                <div id="step1" class="step active">
                    <p style="text-align: center; color: #4e5968; margin-bottom: 2rem;">가입 시 등록한 정보를 입력해 주세요.</p>
                    <form id="verify-form">
                        <div style="margin-bottom: 1rem;">
                            <input type="text" id="username" class="toss-input" placeholder="아이디" required>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <input type="text" id="nickname" class="toss-input" placeholder="닉네임 (예: 아빠, 엄마)" required>
                        </div>
                        <button type="submit" class="toss-button primary full-width">다음</button>
                    </form>
                </div>

                <!-- 2단계: 새 비밀번호 입력 -->
                <div id="step2" class="step">
                    <p style="text-align: center; color: #4e5968; margin-bottom: 2rem;">인증되었습니다. 새 비밀번호를 입력해 주세요.</p>
                    <form id="reset-form">
                        <div style="margin-bottom: 1rem;">
                            <input type="password" id="new-password" class="toss-input" placeholder="새 비밀번호 입력" required>
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <input type="password" id="confirm-password" class="toss-input" placeholder="새 비밀번호 확인" required>
                        </div>
                        <button type="submit" class="toss-button primary full-width">비밀번호 변경하기</button>
                    </form>
                </div>

                <div class="login-link">
                    <a href="/login.html" class="subtle-link">로그인 화면으로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>

    <script>
        let verifiedUsername = '';
        let verifiedNickname = '';

        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const nickname = document.getElementById('nickname').value;
            
            try {
                await api.post('/verify_user', { username, nickname });
                verifiedUsername = username;
                verifiedNickname = nickname;
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
            } catch (error) {
                alert(error.message);
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }

            try {
                await api.post('/reset_password', { 
                    username: verifiedUsername, 
                    nickname: verifiedNickname, 
                    new_password: newPassword 
                });
                alert('비밀번호가 성공적으로 변경되었습니다. 다시 로그인 해주세요.');
                window.location.href = '/login.html';
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
