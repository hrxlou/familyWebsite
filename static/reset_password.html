<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
        })();
    </script>
    <title>비밀번호 재설정 - 우리 가족</title>
    <link rel="stylesheet" href="style.css">
    <script src="api.js"></script>
    <style>
        .auth-wrapper { max-width: 440px; margin: 60px auto; text-align: center; }
        .auth-card { background: var(--color-bg-card); padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--color-border-light); }
    </style>
</head>
<body>
    <div class="page-content-wrapper">
        <div class="auth-wrapper">
            <h1 style="font-size: 2rem; margin-bottom: 12px; color: var(--color-primary);">👨‍👩‍👧‍👦 우리 가족</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: 32px;">비밀번호를 분실하셨나요?</p>

            <div class="auth-card">
                <!-- Step 1: Verify User -->
                <form id="verify-form" onsubmit="event.preventDefault(); verifyUser();">
                    <div style="text-align: left; margin-bottom: 20px;">
                        <label style="font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.9rem;">아이디</label>
                        <input type="text" id="username" class="toss-input" placeholder="아이디" required>
                    </div>
                    <div style="text-align: left; margin-bottom: 32px;">
                        <label style="font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.9rem;">닉네임</label>
                        <input type="text" id="nickname" class="toss-input" placeholder="가입시 설정한 닉네임" required>
                    </div>
                    <button type="submit" id="verify-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">사용자 인증하기</button>
                </form>

                <!-- Step 2: New Password (Hidden) -->
                <form id="reset-form" onsubmit="event.preventDefault(); resetPassword();" style="display: none;">
                    <p style="color: var(--color-primary); font-weight: 700; margin-bottom: 24px;">✅ 인증 성공! 새로운 비밀번호를 입력해 주세요.</p>
                    <div style="text-align: left; margin-bottom: 32px;">
                        <label style="font-weight: 700; margin-bottom: 8px; display: block; font-size: 0.9rem;">새 비밀번호</label>
                        <input type="password" id="new-password" class="toss-input" placeholder="변경할 비밀번호" required>
                    </div>
                    <button type="submit" id="reset-btn" class="toss-button primary full-width" style="height: 52px; font-size: 1.1rem;">비밀번호 변경 완료</button>
                </form>

                <div class="auth-footer-links">
                    <a href="/login.html" class="subtle-link">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let verifiedUser = null;

        async function verifyUser() {
            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            if (!username || !nickname) return;

            try {
                await api.post('/verify_user', { username, nickname });
                verifiedUser = { username, nickname };
                document.getElementById('verify-form').style.display = 'none';
                document.getElementById('reset-form').style.display = 'block';
            } catch (error) {
                alert(`인증 실패: ${error.message}`);
            }
        }

        async function resetPassword() {
            const password = document.getElementById('new-password').value.trim();
            if (!password) return;

            try {
                await api.post('/reset_password', { 
                    username: verifiedUser.username, 
                    nickname: verifiedUser.nickname, 
                    new_password: password 
                });
                alert('비밀번호가 성공적으로 변경되었습니다. 다시 로그인해 주세요.');
                window.location.href = '/login.html';
            } catch (error) {
                alert(`비밀번호 변경 실패: ${error.message}`);
            }
        }
    </script>
    <script src="auth.js"></script>
    <script src="chatbot.js"></script>
    <script src="shared.js"></script>
</body>
</html>
